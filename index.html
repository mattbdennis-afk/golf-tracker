<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Performance Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;color:#1a1a14;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#ece8e0}
::-webkit-scrollbar-thumb{background:#c8bfa8;border-radius:3px}

/* HEADER */
#header{background:linear-gradient(135deg,#1d4a2a,#2d6b3e);padding:14px 24px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
#header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.01em}
#header .subtitle{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.2em;text-transform:uppercase}
#nav{margin-left:auto;display:flex;gap:6px}
.nav-btn{padding:8px 20px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640;letter-spacing:.04em}
.nav-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}

/* MAIN */
#main{padding:20px 24px;max-width:1120px;margin:0 auto}
#footer{padding:10px 24px;border-top:1px solid #ddd5c4;font-size:9px;color:#8a8070;text-align:center;letter-spacing:.1em;text-transform:uppercase}

/* CARDS */
.card{background:#fff;border:1px solid #ddd5c4;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px}
.section-label{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#1d4a2a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1d4a2a}
.section-label.gold{color:#b8860b;border-color:#b8860b}
.section-label.blue{color:#1a3a5c;border-color:#1a3a5c}

/* KPI BOXES */
.kpi-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.kpi{background:#faf7f2;border:1.5px solid #ddd5c4;border-radius:8px;padding:11px 13px;flex:1 1 90px;min-width:82px}
.kpi-label{font-size:8px;color:#8a8070;letter-spacing:.11em;text-transform:uppercase;margin-bottom:3px}
.kpi-value{font-size:21px;font-weight:700;font-family:inherit;letter-spacing:-.02em;line-height:1.1}
.kpi-sub{font-size:9px;color:#8a8070;margin-top:2px}

/* TABS */
.tab-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ddd5c4}
.tab-btn{padding:6px 13px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640;letter-spacing:.03em}
.tab-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.grid .full{grid-column:1/-1}

/* FILL BAR */
.fill-wrap{height:7px;background:#ece8e0;border-radius:4px;overflow:hidden;margin-top:3px}
.fill-bar{height:100%;border-radius:4px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:5px 7px;text-align:center;font-weight:800;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#8a8070;font-family:inherit}
td{padding:7px;text-align:center}
tr{border-bottom:1px solid #ddd5c4}
thead tr{border-bottom:2px solid #1d4a2a}
.avg-row{border-top:2px solid #1d4a2a!important;background:#e8f0ea}

/* SPARKLINE */
.spark-wrap{margin-bottom:8px}
.spark-label{font-size:8px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.spark-bars{display:flex;gap:3px;align-items:flex-end;height:38px}
.spark-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.spark-val{font-size:8px;font-weight:700}
.spark-bar{width:80%;max-width:20px;border-radius:2px 2px 0 0}

/* APPROACH CHART */
.approach-wrap{display:flex;gap:6px;align-items:flex-end;overflow-x:auto;padding-bottom:2px}
.approach-col{flex:1 0 52px;min-width:52px;text-align:center;position:relative}
.approach-pct{font-size:10px;font-weight:700;margin-bottom:2px}
.approach-bar-wrap{position:relative;width:100%;display:flex;align-items:flex-end}
.approach-bar{width:100%;border-radius:3px 3px 0 0;opacity:.8}
.approach-goal-line{position:absolute;left:0;right:0;height:2px;background:#b8860b;opacity:.9;border-radius:1px}
.approach-key{font-size:8px;color:#8a8070;line-height:1.2;margin-top:2px}
.approach-goal{font-size:7px;color:#b8860b;line-height:1}
.approach-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#8a8070}
.legend-dot{width:10px;height:10px;border-radius:2px;opacity:.85}

/* STAT ROW */
.stat-row{margin-bottom:10px}
.stat-row-head{display:flex;justify-content:space-between;margin-bottom:3px;align-items:baseline}
.stat-row-label{font-size:11px;color:#4a4640}
.stat-row-val{font-size:12px;font-weight:700}

/* COLORS */
.pos{color:#1d4a2a} .neg{color:#8b1a1a} .warn{color:#b8860b} .dim{color:#8a8070}
.bg-pos{background:#e8f0ea} .bg-neg{background:#fdeaea} .bg-warn{background:#fdf4dc}
.border-pos{border-top:3px solid #1d4a2a} .border-neg{border-top:3px solid #8b1a1a}
.border-warn{border-top:3px solid #b8860b} .border-gold{border-top:3px solid #b8860b}
.border-blue{border-top:3px solid #1a3a5c} .border-ink{border-top:3px solid #1a1a14}

/* SG CARD */
.sg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.sg-box{padding:10px 12px;border-radius:6px}
.sg-area{font-size:8px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.sg-val{font-size:24px;font-weight:700;line-height:1}
.sg-desc{font-size:9px;color:#8a8070;margin-top:3px}
.sg-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:6px}

/* DATA ANALYSIS */
.analysis-wrap{background:linear-gradient(135deg,#f0ede4,#e8e0d0);border:1px solid #c8bfa8;border-radius:8px;padding:16px;margin-bottom:12px}
.analysis-title{font-size:9px;color:#1d4a2a;letter-spacing:.16em;text-transform:uppercase;font-weight:800;margin-bottom:12px}
.analysis-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.analysis-tag{font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.analysis-msg{font-size:11px;color:#4a4640;line-height:1.55;flex:1}

/* MISS BAR */
.miss-bar-wrap{display:flex;height:14px;border-radius:4px;overflow:hidden}

/* ROUND SELECTOR */
.round-selector{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;padding:12px 14px;background:#fff;border:1px solid #ddd5c4;border-radius:8px}
.round-select-label{font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase}
select{padding:5px 10px;border-radius:4px;border:1px solid #c8bfa8;background:#faf7f2;color:#1a1a14;font-family:inherit;font-size:11px}
.recent-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.recent-btn{padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;background:transparent;color:#4a4640;border:1px solid #ddd5c4}
.recent-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}
.divider{width:1px;height:28px;background:#ddd5c4;flex-shrink:0}

/* SCORE BADGE */
.season-low-badge{font-size:9px;font-weight:800;background:#b8860b;color:#fff;padding:2px 8px;border-radius:3px;letter-spacing:.08em}

/* GREEN MISS GRID */
.miss-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.miss-box{text-align:center;padding:10px;border-radius:6px}
.miss-val{font-size:24px;font-weight:700;line-height:1}
.miss-lbl{font-size:9px;color:#8a8070;margin-top:2px}

/* BENCHMARK TABLE */
.bench-section{font-size:8px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#1d4a2a;padding:8px 6px 3px;text-align:left}
.gap-badge{font-weight:700;font-size:11px;padding:2px 7px;border-radius:4px}

@media(max-width:600px){
  #main{padding:12px}
  .kpi{min-width:70px}
  .approach-col{min-width:38px}
}
</style>

  pos:"#1d4a2a", neg:"#8b1a1a", warn:"#b8860b", dim:"#8a8070",

  greenPale:"#e8f0ea", redPale:"#fdeaea", goldPale:"#fdf4dc", bluePale:"#e8eef5",
};
const BUCKETS = [">200","175-200","150-175","125-150","100-125","75-100","50-75","<50"];
const GOAL = {fir:48,playable:73,gir:36,putts:32.5,threePutt:11,dblWorse:14,upDown:33,par3:3.50,par4:4.60,par5:5.40,gir200p:12,gir175_200:22,gir150_175:32,gir100_125:48,girU100:68};
const APPROACH_GOALS = {">200":12,"175-200":22,"150-175":32,"125-150":48,"100-125":48,"75-100":68,"50-75":68,"<50":68};

function goalColor(v,goal,lower=false,pct=0.12){
  if(v==null||goal==null) return C.dim;
  const gap = lower ? v-goal : goal-v;
  const thr = Math.abs(goal)*pct||0.5;
  if(gap<=0) return C.pos;
  if(gap<=thr) return C.warn;
  return C.neg;
}

function fmt(n,dec=1){return n==null?"-":Number(n).toFixed(dec)}

// -- computed season averages ------------------------------
function calcSA(){
  const n = ROUNDS.length;
  if(!n) return {};
  const avg = k => ROUNDS.reduce((s,r)=>s+(r[k]||0),0)/n;
  const avgBucket = k => {
    const vals = ROUNDS.map(r=>r.approach[k]).filter(v=>v!=null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };
  return {
    score:avg("score"), adjScore:avg("adjScore"),
    fir:avg("fir"), playable:avg("playable"),
    missTeeLeft:avg("missTeeLeft"), missTeeRight:avg("missTeeRight"), ob:avg("ob"),
    gir:avg("gir"), greenShort:avg("greenShort"), greenLong:avg("greenLong"),
    greenLeft:avg("greenLeft"), greenRight:avg("greenRight"),
    putts:avg("putts"), onePutt:avg("onePutt"), twoPutt:avg("twoPutt"), threePutt:avg("threePutt"),
    upDownPct:avg("upDownPct"), sandSavePct:avg("sandSavePct"), penalties:avg("penalties"),
    par3:avg("par3"), par4:avg("par4"), par5:avg("par5"),
    birdies:avg("birdies"), pars:avg("pars"), bogeys:avg("bogeys"), doubles:avg("doubles"),
    dblWorsePct:ROUNDS.reduce((s,r)=>s+(r.doubles/r.par*100),0)/n,
    approach: Object.fromEntries(BUCKETS.map(k=>[k,avgBucket(k)])),
  };
}

const SG_BASE = {playable:0.73, gir:0.36, putts:32.5, scoreVsPar:9};
function calcSG(r){
  const ott  = ((r.playable/100)-SG_BASE.playable)*14*0.38;
  const app  = ((r.gir/100)-SG_BASE.gir)*18*0.52;
  const putt = (SG_BASE.putts-r.putts)*0.48;
  const raw  = -((r.score-r.par)-SG_BASE.scoreVsPar+ott+app+putt);
  const atg  = Math.max(-5,Math.min(5,raw));
  return {ott:+ott.toFixed(2),app:+app.toFixed(2),putt:+putt.toFixed(2),atg:+atg.toFixed(2),total:+(ott+app+putt+atg).toFixed(2)};
}

function sparkline(label,values,lowerBetter,formatFn){
  const clean = values.filter(v=>v!=null);
  if(clean.length<2) return "";
  const mn=Math.min(...clean),mx=Math.max(...clean),rng=mx-mn||1;
  let html = `<div class="spark-wrap"><div class="spark-label">${label}</div><div class="spark-bars">`;
  values.forEach((v,i)=>{
    if(v==null){html+='<div style="flex:1"></div>';return;}
    const norm=(v-mn)/rng;
    const h=lowerBetter?Math.max(3,(1-norm)*30):Math.max(3,norm*30);
    const prev=i>0?values[i-1]:null;
    const better=prev!=null&&(lowerBetter?v<prev:v>prev);
    const worse=prev!=null&&(lowerBetter?v>prev:v<prev);
    const col=better?C.pos:worse?C.neg:"#c8bfa8";
    html+=`<div class="spark-bar-col">
      <div class="spark-val" style="color:${col}">${formatFn(v)}</div>
      <div class="spark-bar" style="height:${h}px;background:${col}"></div>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

      {l:"FIR %",v:you.fir,g:GOAL.fir,u:"%",lb:false},
      {l:"Playable %",v:you.playable,g:GOAL.playable,u:"%",lb:false},

    {l:"APPROACH",rows:[
      {l:"GIR % Overall",v:you.gir,g:GOAL.gir,u:"%",lb:false},
      ...(you.gir200p!=null?[{l:"GIR 200+yds",v:you.gir200p,g:GOAL.gir200p,u:"%",lb:false}]:[]),

    ]},
    {l:"SHORT GAME",rows:[{l:"Up & Down %",v:you.upDown,g:GOAL.upDown,u:"%",lb:false}]},

      {l:"Putts/Round",v:you.putts,g:GOAL.putts,u:"",lb:true},

function roundCoachNotes(r){
  const op=r.score-r.par, notes=[];
  if(op<=10) notes.push({type:"pos",area:"Scoring",msg:`+${op} - NEW SEASON LOW. Exceptional round. Track what clicked.`});
  else if(op<=14) notes.push({type:"pos",area:"Scoring",msg:`+${op} - near season low pace. Build on this.`});
  else if(op>=20) notes.push({type:"neg",area:"Scoring",msg:`+${op} above target range. Focus on bogey avoidance.`});
  else notes.push({type:"neu",area:"Scoring",msg:`+${op} - within typical range. Incremental improvement possible.`});
  if(r.playable>=80) notes.push({type:"pos",area:"Off the Tee",msg:`${r.playable}% playable - excellent tee management.`});
  else if(r.playable<57) notes.push({type:"neg",area:"Off the Tee",msg:`Only ${r.playable}% playable is costing 1-2 strokes.`});
  if(r.gir>=42) notes.push({type:"pos",area:"Ball Striking",msg:`${r.gir}% GIR exceeds 9 HCP target. Sustain this.`});
  else if(r.gir<25) notes.push({type:"neg",area:"Ball Striking",msg:`${r.gir}% GIR is very low. Distance control is the priority.`});
  if(r.threePutt>=30) notes.push({type:"neg",area:"Putting",msg:`${r.threePutt}% three-putt rate costing 2+ strokes. Lag putting focus needed.`});
  else if(r.threePutt===0) notes.push({type:"pos",area:"Putting",msg:`0% three-putts - exceptional lag putting.`});
  else if(r.putts<=32) notes.push({type:"pos",area:"Putting",msg:`${r.putts} putts - most efficient putting round.`});
  if(r.greenShort>=50) notes.push({type:"neg",area:"Approach",msg:`${r.greenShort}% of missed greens are short - take one more club.`});
  if(r.ob>0) notes.push({type:"neg",area:"Penalty",msg:`OB on ${r.ob}% of holes. Tee management cost strokes.`});
  if(r.upDownPct>=36) notes.push({type:"pos",area:"Short Game",msg:`${r.upDownPct}% up & down is at/near 9 HCP standard.`});
  if(r.doubles<=1) notes.push({type:"pos",area:"Damage Control",msg:`Only ${r.doubles} double bogey - excellent damage control.`});
  return notes;
}

function seasonCoachNotes(SA){
  const sg=calcSeasonSG();
  const seasonLow=Math.min(...ROUNDS.map(r=>r.score));
  const lowRound=ROUNDS.find(r=>r.score===seasonLow);
  return [
    {type:"pos",area:"Season Low",msg:`${seasonLow} at ${lowRound.location} - current benchmark. Keep chasing it.`},
    {type:"neu",area:"HCP Profile",msg:`Goal is 9 HCP. The benchmark table shows exact gaps per category.`},
    {type:SA.greenShort>=28?"neg":"neu",area:"#1 Priority",msg:`${fmt(SA.greenShort)}% of missed greens are short all season - one more club is the biggest scoring lever.`},
    {type:SA.threePutt>=15?"neg":"neu",area:"#2 Priority",msg:`${fmt(SA.threePutt)}% three-putt rate (avg ${fmt(SA.putts)} putts/round) vs 11% goal. Lag putting returns 1-2 strokes/round.`},
    {type:sg.app<0?"neg":"pos",area:"Ball Striking",msg:`Approach SG est: ${sg.app>0?"+":""}${sg.app}. GIR avg (${fmt(SA.gir)}%) trending toward 36% goal.`},
    {type:"focus",area:"SG Summary",msg:`Best area: Off the Tee (${sg.ott>0?"+":""}${sg.ott}). Biggest opportunity: Putting (${sg.putt>0?"+":""}${sg.putt} SG).`},
  ];
}

function calcSeasonSG(){
  const all=ROUNDS.map(calcSG);
  const avg=k=>+(all.reduce((s,g)=>s+g[k],0)/all.length).toFixed(2);
  return {ott:avg("ott"),app:avg("app"),putt:avg("putt"),atg:avg("atg"),total:avg("total")};
}

        ${sparkline("Putts",LAST5.map(r=>r.putts),true,v=>`${v}`)}
        ${sparkline("3-Putt%",LAST5.map(r=>r.threePutt),true,v=>`${v}%`)}
      </div>
    </div>`;
  }

  if(seasonTab==="scoring"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Score Distribution - Avg/Round</div>
        ${[["Birdie+",SA.birdies,"#1a3a5c"],["Par",SA.pars,"#1d4a2a"],["Bogey",SA.bogeys,"#b8860b"],["Double+",SA.doubles,"#8b1a1a"]].map(([l,n,c])=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:#4a4640">${l}</span>
              <span style="font-size:11px;font-weight:700;color:${c}">${fmt(n,2)}/rnd - ${fmt(n/18*100,1)}%</span>
            </div>${fillBar(n/18*100,c)}</div>`).join("")}
      </div>
      <div class="card">
        <div class="section-label">Par Type Averages</div>
        ${[["Par 3",SA.par3,3,GOAL.par3],["Par 4",SA.par4,4,GOAL.par4],["Par 5",SA.par5,5,GOAL.par5]].map(([l,avg,p,goal])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 10px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4">
            <div>
              <div style="font-size:12px;color:#4a4640">${l}</div>
              <div style="font-size:9px;color:#8a8070">${(avg-p)>=0?"+":""}${fmt(avg-p,2)} vs par - goal ${goal}</div>
            </div>
            <div style="font-size:26px;font-weight:700;color:${goalColor(avg,goal,true)}">${fmt(avg,2)}</div>
          </div>`).join("")}
      </div>
      <div class="card full">
        <div class="section-label">Scoring Trends - Last ${Math.min(5,ROUNDS.length)} Rounds</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:16px">
          ${sparkline("Par 3 Avg",LAST5.map(r=>r.par3),true,v=>fmt(v,2))}
          ${sparkline("Par 4 Avg",LAST5.map(r=>r.par4),true,v=>fmt(v,2))}
          ${sparkline("Par 5 Avg",LAST5.map(r=>r.par5),true,v=>fmt(v,2))}
          ${sparkline("Bogeys/Rnd",LAST5.map(r=>r.bogeys),true,v=>`${v}`)}
          ${sparkline("Doubles/Rnd",LAST5.map(r=>r.doubles),true,v=>`${v}`)}
        </div>
      </div>
    </div>`;
  }

  if(seasonTab==="tee"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Tee Stats</div>
        ${statRow("FIR %",SA.fir,goalColor(SA.fir,GOAL.fir))}
        ${statRow("Playable Tee %",SA.playable,goalColor(SA.playable,GOAL.playable))}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ddd5c4">
          <div style="display:flex;justify-content:space-around">
            <div style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:#8b4500">${fmt(SA.missTeeLeft,1)}%</div>
              <div style="font-size:9px;color:#8a8070">Miss Left (season)</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:#1a3a5c">${fmt(SA.missTeeRight,1)}%</div>
              <div style="font-size:9px;color:#8a8070">Miss Right (season)</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-label">FIR & Playable Trend</div>
        ${sparkline("FIR%",LAST5.map(r=>r.fir),false,v=>`${v}%`)}
        ${sparkline("Playable%",LAST5.map(r=>r.playable),false,v=>`${v}%`)}
      </div>
      <div class="card">
        <div class="section-label">Miss Direction per Round</div>
        ${ROUNDS.map(r=>`
          <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
            <div style="font-size:9px;color:#8a8070;width:44px;flex-shrink:0">${r.date.slice(5)}</div>
            <div style="flex:1;height:14px;display:flex;border-radius:4px;overflow:hidden">
              <div style="width:${r.missTeeLeft}%;background:#c87020;opacity:.8"></div>
              <div style="flex:1;background:#e8e0d0"></div>
              <div style="width:${r.missTeeRight}%;background:#1a3a5c;opacity:.7"></div>
            </div>
            <div style="font-size:9px;color:#8b4500;width:30px;text-align:right">${r.missTeeLeft}%L</div>
            <div style="font-size:9px;color:#1a3a5c;width:30px;text-align:right">${r.missTeeRight}%R</div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  if(seasonTab==="app"){
    html+=`<div class="grid">
      <div class="card full">
        <div class="section-label">Season Approach GIR% by Distance</div>
        ${approachChart(SA.approach,false)}
      </div>
      <div class="card">
        <div class="section-label">Season Green Miss Pattern</div>
        ${[["v Short",SA.greenShort,C.neg],["^ Long",SA.greenLong,"#6a2abf"],["< Left",SA.greenLeft,"#8b4500"],["> Right",SA.greenRight,C.blue]].map(([l,v,c])=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:#4a4640">${l}</span>
              <span style="font-size:12px;font-weight:700;color:${c}">${fmt(v,1)}%</span>
            </div>${fillBar(v,c)}</div>`).join("")}
        <div style="margin-top:10px;padding:8px 10px;background:#fdeaea;border-radius:6px;border:1px solid ${C.neg}44;font-size:10px;color:${C.neg}">
          (!}) Short (${fmt(SA.greenShort,1)}%) is the dominant miss. Take one more club.
        </div>
      </div>
      <div class="card">
        <div class="section-label">GIR Trend</div>
        ${sparkline("GIR%",LAST5.map(r=>r.gir),false,v=>`${v}%`)}
        ${sparkline("Green Miss Short%",LAST5.map(r=>r.greenShort),true,v=>`${v}%`)}
      </div>
      <div class="card">
        <div class="section-label">GIR per Round</div>
        ${ROUNDS.map(r=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-size:9px;color:#8a8070;width:44px;flex-shrink:0">${r.date.slice(5)}</div>
            <div style="flex:1;height:14px;background:#ece8e0;border-radius:4px;overflow:hidden">
              <div style="width:${r.gir}%;height:100%;background:${goalColor(r.gir,GOAL.gir)}"></div>
            </div>
            <div style="font-size:10px;font-weight:700;color:${goalColor(r.gir,GOAL.gir)};width:36px;text-align:right">${r.gir}%</div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  if(seasonTab==="putt"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Putting Stats</div>
        ${[["Avg Putts/Round",fmt(SA.putts,1),goalColor(SA.putts,GOAL.putts,true)],["1-Putt %",fmt(SA.onePutt,1)+"%",C.pos],["2-Putt %",fmt(SA.twoPutt,1)+"%",C.warn],["3-Putt+ %",fmt(SA.threePutt,1)+"%",goalColor(SA.threePutt,GOAL.threePutt,true)],["Up & Down %",fmt(SA.upDownPct,1)+"%",goalColor(SA.upDownPct,GOAL.upDown)]].map(([l,v,c])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px">
            <span style="font-size:11px;color:#4a4640">${l}</span>
            <span style="font-weight:700;color:${c};font-size:14px">${v}</span>
          </div>`).join("")}
      </div>
      <div class="card">
        <div class="section-label">Putting Distribution</div>
        ${statRow("1-Putt",SA.onePutt,C.pos)}
        ${statRow("2-Putt",SA.twoPutt,C.warn)}
        ${statRow("3-Putt+",SA.threePutt,C.neg)}
      </div>
      <div class="card">
        <div class="section-label">Putting Trends</div>
        ${sparkline("Putts/Round",LAST5.map(r=>r.putts),true,v=>`${v}`)}
        ${sparkline("1-Putt%",LAST5.map(r=>r.onePutt),false,v=>`${v}%`)}
        ${sparkline("3-Putt%",LAST5.map(r=>r.threePutt),true,v=>`${v}%`)}
      </div>
      <div class="card">
        <div class="section-label">Up & Downs by Round</div>
        ${ROUNDS.map(r=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;padding:5px 8px;background:#faf7f2;border-radius:5px">
            <span style="font-size:10px;color:#8a8070">${r.date.slice(5)} - ${r.location.split(" ")[0]}</span>
            <div>
              <span style="font-weight:700;color:${goalColor(r.upDownPct,GOAL.upDown)}">${r.upDowns}</span>
              <span style="font-size:10px;color:${goalColor(r.upDownPct,GOAL.upDown)};margin-left:6px">${r.upDownPct}%</span>
            </div>
          </div>`).join("")}
        <div style="font-size:10px;color:#8a8070;margin-top:4px">Season avg: ${fmt(SA.upDownPct,1)}% - Goal: ${GOAL.upDown}%</div>
      </div>
    </div>`;
  }

  document.getElementById("main").innerHTML = html;
}

function renderRound(SA, seasonLow){
  const r = ROUNDS.find(x=>x.id===selectedRoundId) || ROUNDS[ROUNDS.length-1];
  const sg = calcSG(r);
  const op = r.score - r.par;
  const isLow = r.score===seasonLow;
  const recentRounds = ROUNDS.slice(-5).reverse();

  const tabs=[["scoring","Scoring & Overview"],["tee","Tee & Fairway"],["app","Approach"],["putt","Putting"]];

  let html = `<div class="round-selector">
    <div>
      <div class="round-select-label">Round</div>
      <select onchange="selectRound(this.value)">
        ${[...ROUNDS].reverse().map(x=>`<option value="${x.id}"${x.id===r.id?" selected":""}>${x.date.slice(5)} - ${x.location} - ${x.score}</option>`).join("")}
      </select>
    </div>
    <div class="divider"></div>
    <div class="recent-btns">
      <span class="round-select-label">Recent:</span>
      ${recentRounds.map(x=>`<button class="recent-btn${x.id===r.id?" active":""}" onclick="selectRound('${x.id}')">${x.date.slice(5)} <span style="opacity:.7;font-size:9px">${x.location.split(" ")[0]}</span></button>`).join("")}
    </div>
    <div style="margin-left:auto;font-size:9px;color:#8a8070">${ROUNDS.length} rounds - Season Low: ${seasonLow}</div>
  </div>

  <div style="margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #1d4a2a">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="font-size:22px;font-weight:700;color:#1d4a2a">${r.date}</div>
      ${isLow?'<span class="season-low-badge">* SEASON LOW</span>':""}
    </div>
    <div style="font-size:15px;color:#4a4640;margin-top:2px">
      ${r.location} - ${r.tees||""} tees - ${r.yards} yds - Rating ${r.rating} / Slope ${r.slope} - Par ${r.par}
      ${r.diff?` - Diff ${r.diff}`:""} - HCP ${r.hcp}
    </div>
  </div>

  <div class="kpi-row">
    ${kpiBox("Score",r.score,`+${op} over par${r.adjScore!==r.score?` (adj ${r.adjScore})`:""}`,op<=10?C.pos:op<=14?C.warn:op<=18?"#b8860b":C.neg,"border-"+(op<=10?"pos":op<=14?"warn":"neg"))}
    ${kpiBox("FIR",r.fir+"%",null,goalColor(r.fir,GOAL.fir),"border-"+colorClass(r.fir,GOAL.fir))}
    ${kpiBox("Playable",r.playable+"%",null,goalColor(r.playable,GOAL.playable),"border-"+colorClass(r.playable,GOAL.playable))}
    ${kpiBox("GIR",r.gir+"%",null,goalColor(r.gir,GOAL.gir),"border-"+colorClass(r.gir,GOAL.gir))}
    ${kpiBox("Putts",r.putts,null,goalColor(r.putts,GOAL.putts,true),"border-"+colorClass(r.putts,GOAL.putts,true))}
    ${kpiBox("3-Putt%",r.threePutt+"%",null,goalColor(r.threePutt,GOAL.threePutt,true),"border-"+colorClass(r.threePutt,GOAL.threePutt,true))}
    ${kpiBox("Penalties",r.penalties,null,r.penalties>0?C.neg:C.pos,r.penalties>0?"border-neg":"border-pos")}
    ${kpiBox("U&D",r.upDowns,r.upDownPct+"%",goalColor(r.upDownPct,GOAL.upDown),"border-"+colorClass(r.upDownPct,GOAL.upDown))}
    ${kpiBox("Sand Saves",r.sandSaves||"0/0",r.sandSavePct?r.sandSavePct+"%":null,C.dim,"border-ink")}
  </div>

  <div class="tab-row">
    ${tabs.map(([k,l])=>`<button class="tab-btn${roundTab===k?" active":""}" onclick="setRoundTab('${k}')">${l}</button>`).join("")}
  </div>`;

  if(roundTab==="scoring"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Score Distribution</div>
        ${[["Birdie+",r.birdies,"#1a3a5c"],["Par",r.pars,"#1d4a2a"],["Bogey",r.bogeys,"#b8860b"],["Double+",r.doubles,"#8b1a1a"]].map(([l,n,c])=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:#4a4640">${l}</span>
              <span style="font-size:11px;font-weight:700;color:${c}">${n} holes - ${(n/18*100).toFixed(0)}%</span>
            </div>${fillBar(n/18*100,c)}</div>`).join("")}
      </div>
      <div class="card">
        <div class="section-label">Avg Score by Par Type</div>
        ${[["Par 3",r.par3,3,GOAL.par3],["Par 4",r.par4,4,GOAL.par4],["Par 5",r.par5,5,GOAL.par5]].map(([l,avg,p,goal])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 10px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4">
            <div>
              <div style="font-size:12px;color:#4a4640">${l}</div>
              <div style="font-size:9px;color:#8a8070">${(avg-p)>=0?"+":""}${fmt(avg-p,2)} vs par - goal ${goal}</div>
            </div>
            <div style="font-size:24px;font-weight:700;color:${goalColor(avg,goal,true)}">${fmt(avg,2)}</div>
          </div>`).join("")}
      </div>
      <div class="card full">${sgCard(sg,"Strokes Gained vs 9 HCP Goal")}</div>
      <div class="card full">${benchmarkTable(r,SA)}</div>
      ${r.notes?`<div class="full">${analysisNotes(roundCoachNotes(r))}</div>`:""}
    </div>`;
  }

  if(roundTab==="tee"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Tee Shot Breakdown</div>
        ${statRow("Fairways Hit (FIR)",r.fir,goalColor(r.fir,GOAL.fir))}
        ${statRow("Playable Tee Shots",r.playable,goalColor(r.playable,GOAL.playable))}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ddd5c4">
          <div style="display:flex;justify-content:space-around;padding:14px 0">
            <div style="text-align:center">
              <div style="font-size:36px;font-weight:700;color:#8b4500">${r.missTeeLeft}%</div>
              <div style="font-size:10px;color:#8a8070">Left</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:18px;font-weight:700;color:${C.neg}">${r.ob}%</div>
              <div style="font-size:9px;color:#8a8070">OB</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:36px;font-weight:700;color:#1a3a5c">${r.missTeeRight}%</div>
              <div style="font-size:10px;color:#8a8070">Right</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-label">vs Season Average</div>
        ${[["FIR %",r.fir,SA.fir,false],["Playable %",r.playable,SA.playable,false],["Miss Left",r.missTeeLeft,SA.missTeeLeft,true],["Miss Right",r.missTeeRight,SA.missTeeRight,true]].map(([l,you,avg,lb])=>{
          const diff=lb?avg-you:you-avg;
          return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px">
            <span style="font-size:11px;color:#4a4640">${l}</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:11px;color:#8a8070">Avg:${fmt(avg,1)}%</span>
              <span style="font-weight:700">${you}%</span>
              <span style="font-size:10px;font-weight:700;color:${diff>=0?C.pos:C.neg};background:${diff>=0?C.greenPale:C.redPale};padding:1px 5px;border-radius:3px">${diff>=0?"+":""}${fmt(diff,1)}%</span>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }

  if(roundTab==="app"){
    html+=`<div class="grid">
      <div class="card full">
        <div class="section-label">Approach GIR% by Distance</div>
        ${approachChart(r.approach,false)}
      </div>
      <div class="card">
        <div class="section-label">Green Miss Direction</div>
        <div class="miss-grid">
          ${[["v Short",r.greenShort,C.neg],["^ Long",r.greenLong,"#6a2abf"],["< Left",r.greenLeft,"#8b4500"],["> Right",r.greenRight,C.blue]].map(([l,v,c])=>`
            <div class="miss-box" style="background:${c}12;border:1px solid ${c}33">
              <div class="miss-val" style="color:${v>5?c:C.dim}">${v}%</div>
              <div class="miss-lbl">${l}</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="section-label">GIR Overall</div>
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:52px;font-weight:700;color:${goalColor(r.gir,GOAL.gir)}">${r.gir}%</div>
          <div style="font-size:12px;color:#8a8070">Greens in Regulation</div>
          ${fillBar(r.gir,goalColor(r.gir,GOAL.gir),10)}
          <div style="font-size:11px;color:#8a8070;margin-top:8px">Goal: ${GOAL.gir}% - Season avg: ${fmt(SA.gir,1)}%</div>
        </div>
      </div>
    </div>`;
  }

  if(roundTab==="putt"){
    html+=`<div class="grid">
      <div class="card">
        <div class="section-label">Putting Breakdown</div>
        ${[["1-Putt",r.onePutt,C.pos],["2-Putt",r.twoPutt,C.warn],["3-Putt+",r.threePutt,C.neg]].map(([l,v,c])=>`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:#4a4640">${l}</span>
              <span style="font-size:12px;font-weight:700;color:${c}">${v}%</span>
            </div>${fillBar(v,c)}</div>`).join("")}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px">
          ${[["Total Putts",r.putts],["Per Hole",fmt(r.putts/18,2)],["1-Putt %",r.onePutt+"%"],["3-Putt %",r.threePutt+"%"]].map(([l,v])=>`
            <div style="text-align:center;padding:8px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4">
              <div style="font-size:16px;font-weight:700">${v}</div>
              <div style="font-size:9px;color:#8a8070">${l}</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="section-label">vs Season Average</div>
        ${[["Total Putts",r.putts,SA.putts,true],["1-Putt %",r.onePutt,SA.onePutt,false],["3-Putt %",r.threePutt,SA.threePutt,true],["Up & Down %",r.upDownPct,SA.upDownPct,false]].map(([l,you,avg,lb])=>{
          const diff=lb?avg-you:you-avg;
          return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px">
            <span style="font-size:11px;color:#4a4640">${l}</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:11px;color:#8a8070">Avg:${fmt(avg,1)}</span>
              <span style="font-weight:700">${you}</span>
              <span style="font-size:10px;font-weight:700;color:${diff>=0?C.pos:C.neg};background:${diff>=0?C.greenPale:C.redPale};padding:1px 5px;border-radius:3px">${diff>=0?"+":""}${fmt(diff,1)}</span>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }

  document.getElementById("main").innerHTML = html;
}

function colorClass(v,goal,lower=false){
  const col=goalColor(v,goal,lower);
  if(col===C.pos) return "pos";
  if(col===C.warn) return "warn";
  return "neg";
}

// initial render
render();
</script>

</body>
</html>
