<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;color:#1a1a14;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#ece8e0}
::-webkit-scrollbar-thumb{background:#c8bfa8;border-radius:3px}
#header{background:linear-gradient(135deg,#1d4a2a,#2d6b3e);padding:14px 24px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
#header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.01em}
#header .subtitle{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.2em;text-transform:uppercase}
#nav{margin-left:auto;display:flex;gap:6px}
.nav-btn{padding:8px 20px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;border:2px solid rgba(255,255,255,0.65);background:rgba(255,255,255,0.12);color:#fff;letter-spacing:.04em;font-weight:500;transition:background .15s}
.nav-btn.active{background:#f5f0e8;color:#1d4a2a;border-color:#f5f0e8;font-weight:700}
.nav-btn:hover{background:rgba(255,255,255,0.28)}
#main{padding:20px 24px;max-width:1120px;margin:0 auto}
#footer{padding:10px 24px;border-top:1px solid #ddd5c4;font-size:9px;color:#8a8070;text-align:center;letter-spacing:.1em;text-transform:uppercase}
.card{background:#fff;border:1px solid #ddd5c4;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px}
.section-label{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#1d4a2a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1d4a2a}
.section-label.gold{color:#b8860b;border-color:#b8860b}
.section-label.blue{color:#1a3a5c;border-color:#1a3a5c}
.kpi-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.kpi{background:#faf7f2;border:1.5px solid #ddd5c4;border-radius:8px;padding:11px 13px;flex:1 1 90px;min-width:82px}
.kpi-label{font-size:8px;color:#8a8070;letter-spacing:.11em;text-transform:uppercase;margin-bottom:3px}
.kpi-value{font-size:21px;font-weight:700;font-family:inherit;letter-spacing:-.02em;line-height:1.1}
.kpi-sub{font-size:9px;color:#8a8070;margin-top:2px}
.tab-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ddd5c4}
.tab-btn{padding:6px 13px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640;letter-spacing:.03em}
.tab-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}

.fill-wrap{height:7px;background:#ece8e0;border-radius:4px;overflow:hidden;margin-top:3px}

table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:5px 7px;text-align:center;font-weight:800;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#8a8070;font-family:inherit}

const C={pos:"#1d4a2a",neg:"#8b1a1a",warn:"#b8860b",dim:"#8a8070",blue:"#1a3a5c",ink:"#1a1a14",gold:"#b8860b",greenPale:"#e8f0ea",redPale:"#fdeaea",goldPale:"#fdf4dc"};
const BUCKETS=[">200","175-200","150-175","125-150","100-125","75-100","50-75","<50"];
const GOAL={fir:48,playable:73,gir:36,putts:32.5,threePutt:11,dblWorse:14,upDown:33,par3:3.50,par4:4.60,par5:5.40,gir200p:12,gir175_200:22,gir150_175:32,gir100_125:48,girU100:68};

// ============================================================
// UTILITIES
// ============================================================
function goalColor(v,goal,lower=false,pct=0.12){
  if(v==null||goal==null)return C.dim;
  const gap=lower?v-goal:goal-v,thr=Math.abs(goal)*pct||0.5;
  return gap<=0?C.pos:gap<=thr?C.warn:C.neg;
}
function colorClass(v,goal,lower=false){
  const c=goalColor(v,goal,lower);
  return c===C.pos?"pos":c===C.warn?"warn":"neg";
}
function fmt(n,dec=1){return n==null?"-":Number(n).toFixed(dec)}
function allYears(){return[...new Set(ROUNDS.map(r=>r.date.slice(0,4)))].sort()}
function roundsForYear(yr){return yr==="all"?ROUNDS:ROUNDS.filter(r=>r.date.startsWith(yr))}

function calcSA(rounds){
  const n=rounds.length;
  if(!n)return{};
  const avg=k=>rounds.reduce((s,r)=>s+(r[k]||0),0)/n;
  const avgB=k=>{const v=rounds.map(r=>r.approach[k]).filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null};
  return{
    score:avg("score"),adjScore:avg("adjScore"),fir:avg("fir"),playable:avg("playable"),
    missTeeLeft:avg("missTeeLeft"),missTeeRight:avg("missTeeRight"),ob:avg("ob"),
    gir:avg("gir"),greenShort:avg("greenShort"),greenLong:avg("greenLong"),greenLeft:avg("greenLeft"),greenRight:avg("greenRight"),
    putts:avg("putts"),onePutt:avg("onePutt"),twoPutt:avg("twoPutt"),threePutt:avg("threePutt"),
    upDownPct:avg("upDownPct"),sandSavePct:avg("sandSavePct"),penalties:avg("penalties"),
    par3:avg("par3"),par4:avg("par4"),par5:avg("par5"),
    birdies:avg("birdies"),pars:avg("pars"),bogeys:avg("bogeys"),doubles:avg("doubles"),
    // CORRECTED: total doubles / total holes * 100
    dblWorsePct:rounds.reduce((s,r)=>s+r.doubles,0)/(n*18)*100,
    approach:Object.fromEntries(BUCKETS.map(k=>[k,avgB(k)])),
  };
}

const SG_BASE={playable:0.73,gir:0.36,putts:32.5,scoreVsPar:9};
function calcSG(r){
  const ott=((r.playable/100)-SG_BASE.playable)*14*0.38;
  const app=((r.gir/100)-SG_BASE.gir)*18*0.52;
  const putt=(SG_BASE.putts-r.putts)*0.48;
  const atg=Math.max(-5,Math.min(5,-((r.score-r.par)-SG_BASE.scoreVsPar+ott+app+putt)));
  return{ott:+ott.toFixed(2),app:+app.toFixed(2),putt:+putt.toFixed(2),atg:+atg.toFixed(2),total:+(ott+app+putt+atg).toFixed(2)};
}
function calcSeasonSG(rounds){
  const all=rounds.map(calcSG),avg=k=>+(all.reduce((s,g)=>s+g[k],0)/all.length).toFixed(2);
  return{ott:avg("ott"),app:avg("app"),putt:avg("putt"),atg:avg("atg"),total:avg("total")};
}

function kpi(label,value,sub,color,bc){
  return`<div class="kpi ${bc||""}"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${color||C.ink}">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}</div>`;
}
function fillBar(pct,color,h=7){
  return`<div class="fill-wrap" style="height:${h}px"><div class="fill-bar" style="width:${Math.min(100,pct)}%;background:${color}"></div></div>`;
}
function statRow(label,pct,color){
  return`<div class="stat-row"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${label}</span><span style="font-size:12px;font-weight:700;color:${color}">${fmt(pct)}%</span></div>${fillBar(pct,color)}</div>`;
}

  const active=BUCKETS.filter(k=>approach[k]!=null);
  if(!active.length)return'<div class="dim" style="font-size:11px">No data</div>';
  const H=56;

  active.forEach(key=>{

  return html;
}

// Full-width SVG line chart supporting multiple series
function lineChart(rounds,series,opts){
  const W=900,H=160,P={t:28,r:36,b:36,l:40};
  const IW=W-P.l-P.r,IH=H-P.t-P.b,n=rounds.length;
  if(n<2)return'<div style="font-size:11px;color:#8a8070;padding:8px">Not enough rounds for trend chart</div>';
  let allV=[];
  series.forEach(s=>{rounds.forEach(r=>{if(r[s.key]!=null)allV.push(r[s.key]);});if(s.goalVal!=null)allV.push(s.goalVal);});
  const yMin=opts.yMin!=null?opts.yMin:Math.max(0,Math.min(...allV)*0.9);
  const yMax=opts.yMax!=null?opts.yMax:Math.max(...allV)*1.1;
  const yR=yMax-yMin||1;
  const px=i=>P.l+i*(IW/(n-1));
  const py=v=>P.t+IH-((v-yMin)/yR)*IH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" class="linechart-svg" style="max-height:${H}px">`;
  // grid
  for(let i=0;i<=4;i++){
    const y=P.t+(IH/4)*i,val=yMax-((yMax-yMin)/4)*i;
    svg+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#ddd5c4" stroke-width="1"/>`;
    svg+=`<text x="${P.l-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#8a8070">${fmt(val,0)}</text>`;
  }
  // x labels
  const skip=Math.max(1,Math.ceil(n/10));
  rounds.forEach((r,i)=>{
    if(i%skip!==0&&i!==n-1)return;
    svg+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" font-size="8" fill="#8a8070">${r.date.slice(5)}</text>`;
  });
  // goal lines
  series.forEach(s=>{
    if(s.goalVal==null)return;
    const gy=py(s.goalVal);
    svg+=`<line x1="${P.l}" y1="${gy}" x2="${W-P.r}" y2="${gy}" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="5,4" opacity=".8"/>`;
    svg+=`<text x="${W-P.r+2}" y="${gy+4}" font-size="8" fill="#b8860b">goal</text>`;
  });
  // series
  series.forEach(s=>{
    const pts=rounds.map((r,i)=>({x:px(i),y:r[s.key]!=null?py(r[s.key]):null,v:r[s.key]}));
    let path="";
    pts.forEach((p,i)=>{
      if(p.y==null)return;
      let prev=null;for(let j=i-1;j>=0;j--){if(pts[j].y!=null){prev=pts[j];break;}}
      if(prev)path+=`M${prev.x},${prev.y}L${p.x},${p.y}`;
      else if(!path)path+=`M${p.x},${p.y}`;
    });
    if(path)svg+=`<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round"/>`;
    pts.forEach(p=>{
      if(p.y==null)return;
      svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${s.color}" stroke="#fff" stroke-width="1.5"/>`;
      svg+=`<text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="9" font-weight="700" fill="${s.color}">${fmt(p.v,0)}</text>`;
    });
  });
  // legend
  if(series.length>1){
    let lx=P.l;
    series.forEach(s=>{
      svg+=`<rect x="${lx}" y="4" width="12" height="8" rx="2" fill="${s.color}"/>`;
      svg+=`<text x="${lx+15}" y="12" font-size="9" fill="#4a4640">${s.label}</text>`;
      lx+=90;
    });
  }
  svg+='</svg>';
  return`<div class="linechart-wrap">${svg}</div>`;
}

    fir:r.fir,playable:r.playable,gir:r.gir,putts:r.putts,threePutt:r.threePutt,
    dblWorse:+(r.doubles/18*100).toFixed(1),upDown:r.upDownPct,par3:r.par3,par4:r.par4,par5:r.par5,
    gir200p:r.approach[">200"],gir175:r.approach["175-200"],gir150:r.approach["150-175"],gir100:r.approach["100-125"],
    girU100:(()=>{const v75=r.approach["75-100"],v50=r.approach["<50"];return v75!=null&&v50!=null?(v75+v50)/2:v75??v50;})(),
  }:{
    fir:SA.fir,playable:SA.playable,gir:SA.gir,putts:SA.putts,threePutt:SA.threePutt,
    dblWorse:SA.dblWorsePct,upDown:SA.upDownPct,par3:SA.par3,par4:SA.par4,par5:SA.par5,
    gir200p:SA.approach[">200"],gir175:SA.approach["175-200"],gir150:SA.approach["150-175"],gir100:SA.approach["100-125"],
    girU100:(()=>{const v75=SA.approach["75-100"],v50=SA.approach["<50"];return v75!=null&&v50!=null?(v75+v50)/2:v75??v50;})(),
  };
  const secs=[
    {l:"SCORING",rows:[{l:"Double Bogey+ %",v:you.dblWorse,g:GOAL.dblWorse,u:"%",lb:true},{l:"Par 3 Avg",v:you.par3,g:GOAL.par3,u:"",lb:true},{l:"Par 4 Avg",v:you.par4,g:GOAL.par4,u:"",lb:true},{l:"Par 5 Avg",v:you.par5,g:GOAL.par5,u:"",lb:true}]},
    {l:"DRIVING",rows:[{l:"FIR %",v:you.fir,g:GOAL.fir,u:"%",lb:false},{l:"Playable %",v:you.playable,g:GOAL.playable,u:"%",lb:false}]},
    {l:"APPROACH",rows:[
      {l:"GIR % Overall",v:you.gir,g:GOAL.gir,u:"%",lb:false},
      ...(you.gir200p!=null?[{l:"GIR 200+yds",v:you.gir200p,g:GOAL.gir200p,u:"%",lb:false}]:[]),
      ...(you.gir175!=null?[{l:"GIR 175-200yds",v:you.gir175,g:GOAL.gir175_200,u:"%",lb:false}]:[]),
      ...(you.gir150!=null?[{l:"GIR 150-175yds",v:you.gir150,g:GOAL.gir150_175,u:"%",lb:false}]:[]),
      ...(you.gir100!=null?[{l:"GIR 100-125yds",v:you.gir100,g:GOAL.gir100_125,u:"%",lb:false}]:[]),
      ...(you.girU100!=null?[{l:"GIR Inside 100",v:you.girU100,g:GOAL.girU100,u:"%",lb:false}]:[]),
    ]},
    {l:"SHORT GAME",rows:[{l:"Up & Down %",v:you.upDown,g:GOAL.upDown,u:"%",lb:false}]},
    {l:"PUTTING",rows:[{l:"Putts/Round",v:you.putts,g:GOAL.putts,u:"",lb:true},{l:"3-Putt %",v:you.threePutt,g:GOAL.threePutt,u:"%",lb:true}]},
  ];
  let h=`<div class="card"><div class="section-label gold">${isR?"This Round vs 9 HCP Goal":"Season Stats vs 9 HCP Goal"}</div>
  <div style="margin-bottom:10px;font-size:11px;color:#4a4640;line-height:1.5">Gap vs what a 9 HCP player typically posts. Negative gap = improvement needed.</div>
  <table><thead><tr><th style="text-align:left">Stat</th><th>You</th><th>9 HCP</th><th>Gap</th></tr></thead><tbody>`;
  secs.forEach(s=>{
    h+=`<tr><td colspan="4" class="bench-section">${s.l}</td></tr>`;
    s.rows.forEach(row=>{
      if(row.v==null)return;
      const diff=row.lb?row.g-row.v:row.v-row.g;
      const better=diff>=0,close=!better&&Math.abs(diff)<=Math.abs(row.g)*0.12;
      const gc=better?C.pos:close?C.warn:C.neg,gb=better?C.greenPale:close?C.goldPale:C.redPale;
      h+=`<tr><td style="text-align:left;padding-left:14px;color:#4a4640">${row.l}</td><td style="font-weight:700">${fmt(row.v,1)}${row.u}</td><td style="color:#8a8070">${row.g.toFixed(1)}${row.u}</td><td><span class="gap-badge" style="color:${gc};background:${gb};border:1px solid ${gc}33">${diff===0?"--":`${diff>0?"+":""}${Math.abs(diff).toFixed(1)}${row.u}`}</span></td></tr>`;
    });
  });
  h+='</tbody></table></div>';
  return h;
}

function roundNotes(r){
  const op=r.score-r.par,ns=[];
  if(op<=10)ns.push({t:"pos",a:"Scoring",m:`+${op} - NEW SEASON LOW. Exceptional round.`});
  else if(op<=14)ns.push({t:"pos",a:"Scoring",m:`+${op} - near season low pace.`});
  else if(op>=20)ns.push({t:"neg",a:"Scoring",m:`+${op} above target. Focus on bogey avoidance.`});
  else ns.push({t:"neu",a:"Scoring",m:`+${op} - within typical range.`});
  if(r.playable>=80)ns.push({t:"pos",a:"Off the Tee",m:`${r.playable}% playable - excellent tee management.`});
  else if(r.playable<57)ns.push({t:"neg",a:"Off the Tee",m:`Only ${r.playable}% playable is costing strokes.`});
  if(r.gir>=42)ns.push({t:"pos",a:"Ball Striking",m:`${r.gir}% GIR exceeds 9 HCP target.`});
  else if(r.gir<25)ns.push({t:"neg",a:"Ball Striking",m:`${r.gir}% GIR very low. Distance control is priority.`});
  if(r.threePutt>=30)ns.push({t:"neg",a:"Putting",m:`${r.threePutt}% three-putt rate costing 2+ strokes.`});
  else if(r.threePutt===0)ns.push({t:"pos",a:"Putting",m:`0% three-putts - exceptional lag putting.`});
  else if(r.putts<=32)ns.push({t:"pos",a:"Putting",m:`${r.putts} putts - most efficient round.`});
  if(r.greenShort>=50)ns.push({t:"neg",a:"Approach",m:`${r.greenShort}% short misses - take one more club.`});
  if(r.ob>0)ns.push({t:"neg",a:"Penalty",m:`OB on ${r.ob}% of holes cost strokes.`});
  if(r.upDownPct>=36)ns.push({t:"pos",a:"Short Game",m:`${r.upDownPct}% U&D is at/near 9 HCP standard.`});
  if(r.doubles<=1)ns.push({t:"pos",a:"Damage Control",m:`Only ${r.doubles} double - excellent damage control.`});
  return ns;
}

function seasonNotes(SA,rounds){
  const sg=calcSeasonSG(rounds);
  const low=Math.min(...rounds.map(r=>r.score));
  const lr=rounds.find(r=>r.score===low);
  return[
    {t:"pos",a:"Season Low",m:`${low} at ${lr.location} - current benchmark. Keep chasing it.`},
    {t:"neu",a:"HCP Profile",m:`Goal is 9 HCP. The benchmark table shows exact gaps per category.`},
    {t:SA.greenShort>=28?"neg":"neu",a:"#1 Priority",m:`${fmt(SA.greenShort)}% of missed greens are short - one more club is the biggest scoring lever.`},
    {t:SA.threePutt>=15?"neg":"neu",a:"#2 Priority",m:`${fmt(SA.threePutt)}% three-putt rate (avg ${fmt(SA.putts)} putts/round) vs 11% goal.`},
    {t:sg.app<0?"neg":"pos",a:"Ball Striking",m:`Approach SG: ${sg.app>0?"+":""}${sg.app}. GIR avg ${fmt(SA.gir)}% toward 36% goal.`},
    {t:"focus",a:"SG Summary",m:`Best: Off the Tee (${sg.ott>0?"+":""}${sg.ott}). Biggest opportunity: Putting (${sg.putt>0?"+":""}${sg.putt} SG).`},
  ];
}

function render(){
  const rounds=roundsForYear(selectedYear);

  const seasonLow=rounds.length?Math.min(...rounds.map(r=>r.score)):null;
  const lowRound=rounds.find(r=>r.score===seasonLow);

  document.getElementById("footer").textContent=`${ROUNDS.length} ROUNDS - THROUGH ${ROUNDS[ROUNDS.length-1].date} - SEASON LOW: ${Math.min(...ROUNDS.map(r=>r.score))} - GOAL: 9 HCP`;

        <td style="color:${r.penalties>0?C.neg:C.dim}">${r.penalties||"-"}</td>
        <td style="font-size:10px;color:${goalColor(r.par3,GOAL.par3,true)}">${fmt(r.par3,2)}</td>
        <td style="font-size:10px;color:${goalColor(r.par4,GOAL.par4,true)}">${fmt(r.par4,2)}</td>
        <td style="font-size:10px;color:${goalColor(r.par5,GOAL.par5,true)}">${fmt(r.par5,2)}</td>
      </tr>`;
    });
    h+=`<tr class="avg-row"><td colspan="2" style="text-align:left;color:#1d4a2a;font-weight:800;font-size:10px;padding-left:8px">Season Avg</td>
      <td style="font-weight:700">${fmt(SA.score,1)}</td><td style="font-weight:700;color:#b8860b">+${fmt(SA.score-72,1)}</td>
      <td style="font-weight:700;color:${goalColor(SA.fir,GOAL.fir)}">${fmt(SA.fir,1)}%</td>
      <td style="font-weight:700;color:${goalColor(SA.playable,GOAL.playable)}">${fmt(SA.playable,1)}%</td>
      <td style="font-weight:700;color:${goalColor(SA.gir,GOAL.gir)}">${fmt(SA.gir,1)}%</td>
      <td style="font-weight:700;color:${goalColor(SA.putts,GOAL.putts,true)}">${fmt(SA.putts,1)}</td>
      <td style="font-weight:700;color:${goalColor(SA.threePutt,GOAL.threePutt,true)}">${fmt(SA.threePutt,1)}%</td>
      <td>${fmt(SA.penalties,1)}</td>
      <td style="color:${goalColor(SA.par3,GOAL.par3,true)}">${fmt(SA.par3,2)}</td>
      <td style="color:${goalColor(SA.par4,GOAL.par4,true)}">${fmt(SA.par4,2)}</td>
      <td style="color:${goalColor(SA.par5,GOAL.par5,true)}">${fmt(SA.par5,2)}</td>
    </tr></tbody></table></div>`;

    // SG left + coach notes below it | Benchmark table right
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start">
      <div>
        ${sgCard(sg,"Season Strokes Gained vs 9 HCP Goal")}
        ${notes(seasonNotes(SA,rounds))}
      </div>
      <div>${benchTable(null,SA)}</div>
    </div>`;
  }

  if(seasonTab==="tee"){
    h+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Tee Stats</div>
        ${statRow("FIR %",SA.fir,goalColor(SA.fir,GOAL.fir))}
        ${statRow("Playable Tee %",SA.playable,goalColor(SA.playable,GOAL.playable))}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ddd5c4;display:flex;justify-content:space-around">
          <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#8b4500">${fmt(SA.missTeeLeft,1)}%</div><div style="font-size:9px;color:#8a8070">Miss Left</div></div>
          <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1a3a5c">${fmt(SA.missTeeRight,1)}%</div><div style="font-size:9px;color:#8a8070">Miss Right</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">FIR & Playable % - All Rounds Trend</div>
      ${lineChart(rounds,[{key:"fir",label:"FIR %",color:C.pos,goalVal:GOAL.fir},{key:"playable",label:"Playable %",color:C.blue,goalVal:GOAL.playable}],{yMin:0,yMax:100})}
    </div>
    <div class="card">
      <div class="section-label">Miss Direction % - All Rounds Trend</div>
      ${lineChart(rounds,[{key:"missTeeLeft",label:"Miss Left %",color:"#c87020",goalVal:null},{key:"missTeeRight",label:"Miss Right %",color:C.blue,goalVal:null}],{yMin:0,yMax:100})}
    </div>`;
  }

  if(seasonTab==="app"){
    h+=`<div class="grid">
      <div class="card full">
        <div class="section-label">Season Approach GIR% by Distance</div>
        ${approachChart(SA.approach)}
      </div>
      <div class="card">
        <div class="section-label">Season Green Miss Pattern</div>
        ${[["v Short",SA.greenShort,C.neg],["^ Long",SA.greenLong,"#6a2abf"],["< Left",SA.greenLeft,"#8b4500"],["Right >",SA.greenRight,C.blue]].map(([l,v,c])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-size:12px;font-weight:700;color:${c}">${fmt(v,1)}%</span></div>${fillBar(v,c)}</div>`).join("")}
        <div style="margin-top:10px;padding:8px 10px;background:#fdeaea;border-radius:6px;border:1px solid ${C.neg}44;font-size:10px;color:${C.neg}">Short (${fmt(SA.greenShort,1)}%) is the dominant miss. Take one more club.</div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">GIR % Trend - All Rounds</div>
      ${lineChart(rounds,[{key:"gir",label:"GIR %",color:C.pos,goalVal:GOAL.gir}],{yMin:0,yMax:100})}
    </div>
    <div class="card">
      <div class="section-label">Green Miss Short % Trend - All Rounds</div>
      ${lineChart(rounds,[{key:"greenShort",label:"Short Miss %",color:C.neg,goalVal:null}],{yMin:0,yMax:100})}
    </div>`;
  }

  if(seasonTab==="putt"){
    h+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Putting Stats</div>
        ${[["Avg Putts/Round",fmt(SA.putts,1),goalColor(SA.putts,GOAL.putts,true)],["1-Putt %",fmt(SA.onePutt,1)+"%",C.pos],["2-Putt %",fmt(SA.twoPutt,1)+"%",C.warn],["3-Putt+ %",fmt(SA.threePutt,1)+"%",goalColor(SA.threePutt,GOAL.threePutt,true)],["Up & Down %",fmt(SA.upDownPct,1)+"%",goalColor(SA.upDownPct,GOAL.upDown)]].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-weight:700;color:${c};font-size:14px">${v}</span></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="section-label">Total Putts per Round - Trend</div>
      ${lineChart(rounds,[{key:"putts",label:"Putts",color:C.neg,goalVal:GOAL.putts}],{yMin:28,yMax:46})}
    </div>
    <div class="card">
      <div class="section-label">1-Putt / 2-Putt / 3-Putt % - Trend</div>
      ${lineChart(rounds,[{key:"onePutt",label:"1-Putt %",color:C.pos,goalVal:null},{key:"twoPutt",label:"2-Putt %",color:C.warn,goalVal:null},{key:"threePutt",label:"3-Putt %",color:C.neg,goalVal:GOAL.threePutt}],{yMin:0,yMax:100})}
    </div>
    <div class="card">
      <div class="section-label">Up & Down % - Trend</div>
      ${lineChart(rounds,[{key:"upDownPct",label:"U&D %",color:C.blue,goalVal:GOAL.upDown}],{yMin:0,yMax:100})}
    </div>`;
  }

  document.getElementById("main").innerHTML=h;
}

// ============================================================
// ROUND VIEW
// ============================================================
function renderRound(SA,seasonLow){
  const r=ROUNDS.find(x=>x.id===selectedRoundId)||ROUNDS[ROUNDS.length-1];
  const sg=calcSG(r);
  const op=r.score-r.par;
  const isLow=r.score===seasonLow;
  const recent=ROUNDS.slice(-5).reverse();
  const tabs=[["scoring","Scoring & Overview"],["tee","Tee & Fairway"],["app","Approach"],["putt","Putting"]];

  let h=`<div class="round-selector">
    <div><div class="round-select-label">Round</div>
    <select onchange="selectRound(this.value)">${[...ROUNDS].reverse().map(x=>`<option value="${x.id}"${x.id===r.id?" selected":""}>${x.date.slice(5)} - ${x.location} - ${x.score}</option>`).join("")}</select></div>
    <div class="divider"></div>
    <div class="recent-btns"><span class="round-select-label">Recent:</span>
      ${recent.map(x=>`<button class="recent-btn${x.id===r.id?" active":""}" onclick="selectRound('${x.id}')">${x.date.slice(5)} <span style="opacity:.7;font-size:9px">${x.location.split(" ")[0]}</span></button>`).join("")}
    </div>
    <div style="margin-left:auto;font-size:9px;color:#8a8070">${ROUNDS.length} rounds - Low: ${seasonLow}</div>
  </div>
  <div style="margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #1d4a2a">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="font-size:22px;font-weight:700;color:#1d4a2a">${r.date}</div>
      ${isLow?'<span class="season-low-badge">* SEASON LOW</span>':""}
    </div>
    <div style="font-size:15px;color:#4a4640;margin-top:2px">${r.location} - ${r.tees||""} tees - ${r.yards} yds - Rating ${r.rating} / Slope ${r.slope} - Par ${r.par}${r.diff?` - Diff ${r.diff}`:""} - HCP ${r.hcp}</div>
  </div>
  <div class="kpi-row">
    ${kpi("Score",r.score,`+${op} over par${r.adjScore!==r.score?` (adj ${r.adjScore})`:""}`,op<=10?C.pos:op<=14?C.warn:op<=18?"#b8860b":C.neg,"border-"+(op<=10?"pos":op<=14?"warn":"neg"))}
    ${kpi("FIR",r.fir+"%",null,goalColor(r.fir,GOAL.fir),"border-"+colorClass(r.fir,GOAL.fir))}
    ${kpi("Playable",r.playable+"%",null,goalColor(r.playable,GOAL.playable),"border-"+colorClass(r.playable,GOAL.playable))}
    ${kpi("GIR",r.gir+"%",null,goalColor(r.gir,GOAL.gir),"border-"+colorClass(r.gir,GOAL.gir))}
    ${kpi("Putts",r.putts,null,goalColor(r.putts,GOAL.putts,true),"border-"+colorClass(r.putts,GOAL.putts,true))}
    ${kpi("3-Putt%",r.threePutt+"%",null,goalColor(r.threePutt,GOAL.threePutt,true),"border-"+colorClass(r.threePutt,GOAL.threePutt,true))}
    ${kpi("Penalties",r.penalties,null,r.penalties>0?C.neg:C.pos,r.penalties>0?"border-neg":"border-pos")}
    ${kpi("U&D",r.upDowns,r.upDownPct+"%",goalColor(r.upDownPct,GOAL.upDown),"border-"+colorClass(r.upDownPct,GOAL.upDown))}
    ${kpi("Sand Saves",r.sandSaves||"0/0",r.sandSavePct?r.sandSavePct+"%":null,C.dim,"border-ink")}
  </div>
  <div class="tab-row">${tabs.map(([k,l])=>`<button class="tab-btn${roundTab===k?" active":""}" onclick="setRoundTab('${k}')">${l}</button>`).join("")}</div>`;

  if(roundTab==="scoring"){
    h+=`<div class="grid">
      <div class="card"><div class="section-label">Score Distribution</div>
        ${[["Birdie+",r.birdies,"#1a3a5c"],["Par",r.pars,"#1d4a2a"],["Bogey",r.bogeys,"#b8860b"],["Double+",r.doubles,"#8b1a1a"]].map(([l,n,c])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-size:11px;font-weight:700;color:${c}">${n} holes - ${(n/18*100).toFixed(0)}%</span></div>${fillBar(n/18*100,c)}</div>`).join("")}
      </div>
      <div class="card"><div class="section-label">Avg Score by Par Type</div>
        ${[["Par 3",r.par3,3,GOAL.par3],["Par 4",r.par4,4,GOAL.par4],["Par 5",r.par5,5,GOAL.par5]].map(([l,avg,p,goal])=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 10px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4"><div><div style="font-size:12px;color:#4a4640">${l}</div><div style="font-size:9px;color:#8a8070">${(avg-p)>=0?"+":""}${fmt(avg-p,2)} vs par - goal ${goal}</div></div><div style="font-size:24px;font-weight:700;color:${goalColor(avg,goal,true)}">${fmt(avg,2)}</div></div>`).join("")}
      </div>
      <div class="card full">${sgCard(sg,"Strokes Gained vs 9 HCP Goal")}</div>
      <div class="card full">${benchTable(r,SA)}</div>
      ${r.notes?`<div class="full">${notes(roundNotes(r))}</div>`:""}
    </div>`;
  }

  if(roundTab==="tee"){
    h+=`<div class="grid">
      <div class="card"><div class="section-label">Tee Shot Breakdown</div>
        ${statRow("Fairways Hit (FIR)",r.fir,goalColor(r.fir,GOAL.fir))}
        ${statRow("Playable Tee Shots",r.playable,goalColor(r.playable,GOAL.playable))}
        <div style="display:flex;justify-content:space-around;padding:14px 0;margin-top:12px;border-top:1px solid #ddd5c4">
          <div style="text-align:center"><div style="font-size:36px;font-weight:700;color:#8b4500">${r.missTeeLeft}%</div><div style="font-size:10px;color:#8a8070">Left</div></div>
          <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:${C.neg}">${r.ob}%</div><div style="font-size:9px;color:#8a8070">OB</div></div>
          <div style="text-align:center"><div style="font-size:36px;font-weight:700;color:#1a3a5c">${r.missTeeRight}%</div><div style="font-size:10px;color:#8a8070">Right</div></div>
        </div>
      </div>
      <div class="card"><div class="section-label">vs Season Average</div>
        ${[["FIR %",r.fir,SA.fir,false],["Playable %",r.playable,SA.playable,false],["Miss Left",r.missTeeLeft,SA.missTeeLeft,true],["Miss Right",r.missTeeRight,SA.missTeeRight,true]].map(([l,you,avg,lb])=>{
          const diff=lb?avg-you:you-avg;
          return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px"><span style="font-size:11px;color:#4a4640">${l}</span><div style="display:flex;gap:10px;align-items:center"><span style="font-size:11px;color:#8a8070">Avg:${fmt(avg,1)}%</span><span style="font-weight:700">${you}%</span><span style="font-size:10px;font-weight:700;color:${diff>=0?C.pos:C.neg};background:${diff>=0?C.greenPale:C.redPale};padding:1px 5px;border-radius:3px">${diff>=0?"+":""}${fmt(diff,1)}%</span></div></div>`;
        }).join("")}
      </div>
    </div>`;
  }

  if(roundTab==="app"){
    h+=`<div class="grid">
      <div class="card full"><div class="section-label">Approach GIR% by Distance</div>${approachChart(r.approach)}</div>
      <div class="card"><div class="section-label">Green Miss Direction</div>
        <div class="miss-grid">
          ${[["v Short",r.greenShort,C.neg],["^ Long",r.greenLong,"#6a2abf"],["< Left",r.greenLeft,"#8b4500"],["Right >",r.greenRight,C.blue]].map(([l,v,c])=>`<div class="miss-box" style="background:${c}12;border:1px solid ${c}33"><div class="miss-val" style="color:${v>5?c:C.dim}">${v}%</div><div class="miss-lbl">${l}</div></div>`).join("")}
        </div>
      </div>
      <div class="card"><div class="section-label">GIR Overall</div>
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:52px;font-weight:700;color:${goalColor(r.gir,GOAL.gir)}">${r.gir}%</div>
          <div style="font-size:12px;color:#8a8070">Greens in Regulation</div>
          ${fillBar(r.gir,goalColor(r.gir,GOAL.gir),10)}
          <div style="font-size:11px;color:#8a8070;margin-top:8px">Goal: ${GOAL.gir}% - Season avg: ${fmt(SA.gir,1)}%</div>
        </div>
      </div>
    </div>`;
  }

  if(roundTab==="putt"){
    h+=`<div class="grid">
      <div class="card"><div class="section-label">Putting Breakdown</div>
        ${[["1-Putt",r.onePutt,C.pos],["2-Putt",r.twoPutt,C.warn],["3-Putt+",r.threePutt,C.neg]].map(([l,v,c])=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-size:12px;font-weight:700;color:${c}">${v}%</span></div>${fillBar(v,c)}</div>`).join("")}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px">
          ${[["Total Putts",r.putts],["Per Hole",fmt(r.putts/18,2)],["1-Putt %",r.onePutt+"%"],["3-Putt %",r.threePutt+"%"]].map(([l,v])=>`<div style="text-align:center;padding:8px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4"><div style="font-size:16px;font-weight:700">${v}</div><div style="font-size:9px;color:#8a8070">${l}</div></div>`).join("")}
        </div>
      </div>
      <div class="card"><div class="section-label">vs Season Average</div>
        ${[["Total Putts",r.putts,SA.putts,true],["1-Putt %",r.onePutt,SA.onePutt,false],["3-Putt %",r.threePutt,SA.threePutt,true],["Up & Down %",r.upDownPct,SA.upDownPct,false]].map(([l,you,avg,lb])=>{
          const diff=lb?avg-you:you-avg;
          return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px"><span style="font-size:11px;color:#4a4640">${l}</span><div style="display:flex;gap:10px;align-items:center"><span style="font-size:11px;color:#8a8070">Avg:${fmt(avg,1)}</span><span style="font-weight:700">${you}</span><span style="font-size:10px;font-weight:700;color:${diff>=0?C.pos:C.neg};background:${diff>=0?C.greenPale:C.redPale};padding:1px 5px;border-radius:3px">${diff>=0?"+":""}${fmt(diff,1)}</span></div></div>`;
        }).join("")}
      </div>
    </div>`;
  }

  document.getElementById("main").innerHTML=h;
}

render();
</script>

</body>
</html>
