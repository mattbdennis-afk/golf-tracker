<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Performance Dashboard 2025-2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;color:#1a1a14;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#ece8e0}
::-webkit-scrollbar-thumb{background:#c8bfa8;border-radius:3px}
#header{background:linear-gradient(135deg,#1d4a2a,#2d6b3e);padding:14px 24px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
#header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.01em}
#header .subtitle{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.2em;text-transform:uppercase}
#nav{margin-left:auto;display:flex;gap:6px}
.nav-btn{padding:8px 20px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;border:2px solid rgba(255,255,255,0.65);background:rgba(255,255,255,0.12);color:#fff;letter-spacing:.04em;font-weight:500;transition:background .15s}
.nav-btn.active{background:#f5f0e8;color:#1d4a2a;border-color:#f5f0e8;font-weight:700}
.nav-btn:hover{background:rgba(255,255,255,0.28)}
#main{padding:20px 24px;max-width:1120px;margin:0 auto}
#footer{padding:10px 24px;border-top:1px solid #ddd5c4;font-size:9px;color:#8a8070;text-align:center;letter-spacing:.1em;text-transform:uppercase}
.card{background:#fff;border:1px solid #ddd5c4;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px}
.section-label{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#1d4a2a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1d4a2a}
.section-label.gold{color:#b8860b;border-color:#b8860b}
.section-label.blue{color:#1a3a5c;border-color:#1a3a5c}
.kpi-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.kpi{background:#faf7f2;border:1.5px solid #ddd5c4;border-radius:8px;padding:11px 13px;flex:1 1 90px;min-width:82px}
.kpi-label{font-size:8px;color:#8a8070;letter-spacing:.11em;text-transform:uppercase;margin-bottom:3px}
.kpi-value{font-size:21px;font-weight:700;font-family:inherit;letter-spacing:-.02em;line-height:1.1}
.kpi-sub{font-size:9px;color:#8a8070;margin-top:2px}
.tab-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ddd5c4}
.tab-btn{padding:6px 13px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640;letter-spacing:.03em}
.tab-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.grid .full{grid-column:1/-1}
.fill-wrap{height:7px;background:#ece8e0;border-radius:4px;overflow:hidden;margin-top:3px}
.fill-bar{height:100%;border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:5px 7px;text-align:center;font-weight:800;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#8a8070;font-family:inherit}
td{padding:7px;text-align:center}
tr{border-bottom:1px solid #ddd5c4}
thead tr{border-bottom:2px solid #1d4a2a}
.avg-row{border-top:2px solid #1d4a2a!important;background:#e8f0ea}
.approach-wrap{display:flex;gap:6px;align-items:flex-end;overflow-x:auto;padding-bottom:2px}
.approach-col{flex:1 0 52px;min-width:52px;text-align:center;position:relative}
.approach-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#8a8070}
.legend-dot{width:10px;height:10px;border-radius:2px;opacity:.85}
.stat-row{margin-bottom:10px}
.pos{color:#1d4a2a}.neg{color:#8b1a1a}.warn{color:#b8860b}.dim{color:#8a8070}
.bg-pos{background:#e8f0ea}.bg-neg{background:#fdeaea}.bg-warn{background:#fdf4dc}
.border-pos{border-top:3px solid #1d4a2a}.border-neg{border-top:3px solid #8b1a1a}
.border-warn{border-top:3px solid #b8860b}.border-gold{border-top:3px solid #b8860b}
.border-blue{border-top:3px solid #1a3a5c}.border-ink{border-top:3px solid #1a1a14}
.sg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.sg-box{padding:10px 12px;border-radius:6px}
.sg-area{font-size:8px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.sg-val{font-size:24px;font-weight:700;line-height:1}
.sg-desc{font-size:9px;color:#8a8070;margin-top:3px}
.sg-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:6px}
.analysis-wrap{background:linear-gradient(135deg,#f0ede4,#e8e0d0);border:1px solid #c8bfa8;border-radius:8px;padding:16px;margin-bottom:12px}
.analysis-title{font-size:9px;color:#1d4a2a;letter-spacing:.16em;text-transform:uppercase;font-weight:800;margin-bottom:12px}
.analysis-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.analysis-tag{font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.analysis-msg{font-size:11px;color:#4a4640;line-height:1.55;flex:1}
.round-selector{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;padding:12px 14px;background:#fff;border:1px solid #ddd5c4;border-radius:8px}
.round-select-label{font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase}
select{padding:5px 10px;border-radius:4px;border:1px solid #c8bfa8;background:#faf7f2;color:#1a1a14;font-family:inherit;font-size:11px}
.recent-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.recent-btn{padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;background:transparent;color:#4a4640;border:1px solid #ddd5c4}
.recent-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}
.divider{width:1px;height:28px;background:#ddd5c4;flex-shrink:0}
.season-low-badge{font-size:9px;font-weight:800;background:#b8860b;color:#fff;padding:2px 8px;border-radius:3px;letter-spacing:.08em}
.miss-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.miss-box{text-align:center;padding:10px;border-radius:6px}
.miss-val{font-size:24px;font-weight:700;line-height:1}
.miss-lbl{font-size:9px;color:#8a8070;margin-top:2px}
.bench-section{font-size:8px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#1d4a2a;padding:8px 6px 3px;text-align:left}
.gap-badge{font-weight:700;font-size:11px;padding:2px 7px;border-radius:4px}
.linechart-wrap{width:100%;overflow-x:auto}
.linechart-svg{width:100%;display:block}
.year-filter{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.year-btn{padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640}
.year-btn.active{background:#1d4a2a;color:#fff;border-color:#1d4a2a;font-weight:700}
@media(max-width:600px){#main{padding:12px}.kpi{min-width:70px}}
.trend-period-btn{padding:5px 13px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;border:1px solid #c8bfa8;background:transparent;color:#4a4640;letter-spacing:.03em}
.trend-period-btn.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;font-weight:700}
.trend-stat-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.trend-stat-box{text-align:center;padding:10px 8px;border-radius:8px;background:#faf7f2;border:1px solid #ddd5c4}
.trend-stat-val{font-size:22px;font-weight:700;line-height:1.1}
.trend-stat-lbl{font-size:8px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.trend-stat-sub{font-size:9px;color:#8a8070;margin-top:1px}
</style>
</head>

function goalColor(v,goal,lower=false,pct=0.12){
  if(v==null||goal==null)return C.dim;
  const gap=lower?v-goal:goal-v,thr=Math.abs(goal)*pct||0.5;
  return gap<=0?C.pos:gap<=thr?C.warn:C.neg;
}
function colorClass(v,goal,lower=false){
  const c=goalColor(v,goal,lower);
  return c===C.pos?"pos":c===C.warn?"warn":"neg";
}
function fmt(n,dec=1){return n==null?"-":Number(n).toFixed(dec)}
function allYears(){
  const rs=selectedRoundType==="all"?ROUNDS:ROUNDS.filter(r=>!r.roundType||r.roundType===selectedRoundType);
  return[...new Set(rs.map(r=>r.date.slice(0,4)))].sort();
}
function roundsForYear(yr,rt){
  let rs=yr==="all"?ROUNDS:ROUNDS.filter(r=>r.date.startsWith(yr));
  rs=rs.filter(r=>r.score>0); // exclude incomplete rounds
  if(!rt||rt==="18hole")rs=rs.filter(r=>!r.roundType||r.roundType==="18hole");
  else if(rt==="9hole")rs=rs.filter(r=>r.roundType==="9hole");
  else if(rt==="exec")rs=rs.filter(r=>r.roundType==="exec");
  // "all" shows everything with a score
  return rs;
}

function calcSA(rounds){
  const n=rounds.length;
  if(!n)return{};
  const avg=k=>{
    const vals=rounds.map(r=>r[k]).filter(v=>v!=null&&v!==undefined);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  };
  const avgB=k=>{const v=rounds.map(r=>r.approach[k]).filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null};
  const rdWithScoreDist=rounds.filter(r=>r.birdies!=null||r.pars!=null||r.bogeys!=null||r.doubles!=null);
  const nd=rdWithScoreDist.length||1;
  return{
    score:avg("score"),adjScore:avg("adjScore"),fir:avg("fir"),playable:avg("playable"),
    missTeeLeft:avg("missTeeLeft"),missTeeRight:avg("missTeeRight"),ob:avg("ob"),
    gir:avg("gir"),greenShort:avg("greenShort"),greenLong:avg("greenLong"),greenLeft:avg("greenLeft"),greenRight:avg("greenRight"),
    putts:avg("putts"),onePutt:avg("onePutt"),twoPutt:avg("twoPutt"),threePutt:avg("threePutt"),
    upDownPct:avg("upDownPct"),sandSavePct:avg("sandSavePct"),penalties:avg("penalties"),
    par3:avg("par3"),par4:avg("par4"),par5:avg("par5"),
    birdies:avg("birdies"),pars:avg("pars"),bogeys:avg("bogeys"),doubles:avg("doubles"),
    avgPPG:(()=>{const gr=rounds.filter(r=>r.girsHit&&r.girsHit>0&&r.girPutts!=null);return gr.length?+(gr.reduce((s,r)=>s+(r.girPutts/r.girsHit),0)/gr.length).toFixed(2):null;})(),
    dblWorsePct:rdWithScoreDist.reduce((s,r)=>s+(r.doubles||0),0)/(nd*18)*100,
    approach:Object.fromEntries(BUCKETS.map(k=>[k,avgB(k)])),
  };
}

const SG_BASE={playable:0.73,gir:0.36,putts:32.5,scoreVsPar:9};
function calcSG(r){
  const playable=r.playable||0, gir=r.gir||0, putts=r.putts||0;
  const ott=((playable/100)-SG_BASE.playable)*14*0.38;
  const app=((gir/100)-SG_BASE.gir)*18*0.52;
  const putt=putts>0?(SG_BASE.putts-putts)*0.48:0;
  const atg=Math.max(-5,Math.min(5,-((r.score-r.par)-SG_BASE.scoreVsPar+ott+app+putt)));
  return{ott:+ott.toFixed(2),app:+app.toFixed(2),putt:+putt.toFixed(2),atg:+atg.toFixed(2),total:+(ott+app+putt+atg).toFixed(2)};
}
function calcSeasonSG(rounds){
  const all=rounds.map(calcSG),avg=k=>+(all.reduce((s,g)=>s+g[k],0)/all.length).toFixed(2);
  return{ott:avg("ott"),app:avg("app"),putt:avg("putt"),atg:avg("atg"),total:avg("total")};
}

function approachChart(approach){
  const active=BUCKETS.filter(k=>approach[k]!=null);
  if(!active.length)return'<div class="dim" style="font-size:11px">No data</div>';

  </div>`;

}

function lineChart(rounds,series,opts){
  const W=900,H=opts.H||280,P={t:28,r:50,b:36,l:48};
  const IW=W-P.l-P.r,IH=H-P.t-P.b,n=rounds.length;
  if(n<2)return'<div style="font-size:11px;color:#8a8070;padding:8px">Not enough rounds for trend chart</div>';
  let allV=[];
  series.forEach(s=>{rounds.forEach(r=>{if(r[s.key]!=null)allV.push(r[s.key]);});if(s.goalVal!=null)allV.push(s.goalVal);});
  // Auto-scale tight to actual data range (like weight app) — ignore forced 0-100
  const dataMin=Math.min(...allV), dataMax=Math.max(...allV);
  const spread=dataMax-dataMin||2;
  const pad=Math.max(1, spread*0.08);
  const yMin=opts.yMin!=null?opts.yMin:dataMin-pad;
  const yMax=opts.yMax!=null?opts.yMax:dataMax+pad;
  const yR=yMax-yMin||1;
  const px=i=>P.l+i*(IW/(n-1));
  const py=v=>P.t+IH-((v-yMin)/yR)*IH;

  // Gaussian-weighted LOESS smooth — same engine as scoreTrendSVG
  function loessSmooth(vals, bw){
    const m=vals.length;
    if(m<2) return vals.slice();
    return vals.map((_,i)=>{
      let wsum=0, wval=0;
      for(let j=0;j<m;j++){
        const d=Math.abs(i-j)/bw;
        const w=Math.exp(-0.5*d*d);
        wsum+=w; wval+=w*vals[j];
      }
      return wval/wsum;
    });
  }

  function splinePath(xArr, yArr){
    if(xArr.length<2) return "";
    let d="M"+xArr[0]+","+yArr[0];
    for(let i=1;i<xArr.length;i++){
      const p0x=xArr[Math.max(0,i-2)], p0y=yArr[Math.max(0,i-2)];
      const p1x=xArr[Math.max(0,i-1)], p1y=yArr[Math.max(0,i-1)];
      const p2x=xArr[i], p2y=yArr[i];
      const p3x=xArr[Math.min(xArr.length-1,i+1)], p3y=yArr[Math.min(yArr.length-1,i+1)];
      const t=0.4;
      const cp1x=p1x+(p2x-p0x)*t, cp1y=p1y+(p2y-p0y)*t;
      const cp2x=p2x-(p3x-p1x)*t, cp2y=p2y-(p3y-p1y)*t;
      d+=`C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2x},${p2y}`;
    }
    return d;
  }

  let svg="<svg viewBox=\"0 0 "+W+" "+H+"\" class=\"linechart-svg\" style=\"max-height:"+H+"px\">";

  for(let i=0;i<=4;i++){
    const y=P.t+(IH/4)*i,val=yMax-((yMax-yMin)/4)*i;
    svg+="<line x1=\""+P.l+"\" y1=\""+y+"\" x2=\""+(W-P.r)+"\" y2=\""+y+"\" stroke=\"#e8e0d0\" stroke-width=\"1\"/>";
    svg+="<text x=\""+(P.l-4)+"\" y=\""+(y+4)+"\" text-anchor=\"end\" font-size=\"9\" fill=\"#8a8070\">"+fmt(val,1)+"</text>";
  }

  const skip=Math.max(1,Math.ceil(n/12));
  rounds.forEach(function(r,i){
    if(i%skip!==0&&i!==n-1)return;
    // MM-DD format for within-season charts
    svg+="<text x=\""+px(i)+"\" y=\""+(H-4)+"\" text-anchor=\"middle\" font-size=\"8\" fill=\"#8a8070\">"+r.date.slice(5)+"</text>";
  });

  series.forEach(function(s){
    if(s.goalVal==null)return;
    const gy=py(s.goalVal);
    svg+="<line x1=\""+P.l+"\" y1=\""+gy+"\" x2=\""+(W-P.r)+"\" y2=\""+gy+"\" stroke=\"#b8860b\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\" opacity=\".7\"/>";
    svg+="<text x=\""+(W-P.r+3)+"\" y=\""+(gy+4)+"\" font-size=\"8\" fill=\"#b8860b\">goal</text>";
  });

  series.forEach(function(s){
    const validEntries=rounds.reduce((acc,r,i)=>{if(r[s.key]!=null)acc.push({val:r[s.key],idx:i});return acc;},[]);
    const rawVals=validEntries.map(e=>e.val);
    const xCoords=validEntries.map(e=>px(e.idx));
    if(rawVals.length<1) return;

    // Raw dots
    const pts=rounds.map(function(r,i){return{x:px(i),y:r[s.key]!=null?py(r[s.key]):null,rawV:r[s.key]};});
    const vp=pts.filter(p=>p.y!=null);

    // Light raw area fill
    if(vp.length>=2){
      const firstV=vp[0],lastV=vp[vp.length-1];
      let rawPath="M"+vp[0].x+","+vp[0].y;
      for(let i=1;i<vp.length;i++) rawPath+="L"+vp[i].x+","+vp[i].y;
      const areaPath=rawPath+"L"+lastV.x+","+(P.t+IH)+" L"+firstV.x+","+(P.t+IH)+"Z";
      svg+="<path d=\""+areaPath+"\" fill=\""+s.color+"\" opacity=\".06\"/>";
    }

    // LOESS smoothed trend curve — fixed bandwidth so large datasets don't flatten
    if(rawVals.length>=3){
      const bw=3.5;
      const smoothed=loessSmooth(rawVals, bw);
      const smoothedY=smoothed.map(v=>py(Math.max(yMin,Math.min(yMax,v))));
      const trendPath=splinePath(xCoords, smoothedY);
      // Determine direction from smoothed trend
      const tDelta=smoothed[smoothed.length-1]-smoothed[0];
      // For score/putts lower is better; for gir/fir/playable higher is better
      const lowerIsBetter=s.goalVal!=null?(s.goalVal<50):false;
      const improving=lowerIsBetter?tDelta<0:tDelta>0;
      const tColor=improving?"#1d6b40":"#c0392b";
      svg+="<path d=\""+trendPath+"\" fill=\"none\" stroke=\""+tColor+"\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" opacity=\"0.75\"/>";
    } else if(vp.length>=2){
      // fallback straight line for 2 points
      svg+="<line x1=\""+vp[0].x+"\" y1=\""+vp[0].y+"\" x2=\""+vp[vp.length-1].x+"\" y2=\""+vp[vp.length-1].y+"\" stroke=\""+s.color+"\" stroke-width=\"1.5\" opacity=\".5\"/>";
    }

    // Raw data dots
    const showLabels=n<=16;
    pts.forEach(function(p){
      if(p.y==null)return;
      svg+="<circle cx=\""+p.x+"\" cy=\""+p.y+"\" r=\"3\" fill=\""+s.color+"\" stroke=\"#fff\" stroke-width=\"1.5\" opacity=\"0.7\"/>";
      if(showLabels)svg+="<text x=\""+p.x+"\" y=\""+(p.y-7)+"\" text-anchor=\"middle\" font-size=\"8\" fill=\""+s.color+"\" opacity=\"0.8\">"+fmt(p.rawV,1)+"</text>";
    });
  });

  if(series.length>1){
    let lx=P.l;
    series.forEach(function(s){
      svg+="<rect x=\""+lx+"\" y=\"4\" width=\"10\" height=\"8\" rx=\"2\" fill=\""+s.color+"\"/>";
      svg+="<text x=\""+(lx+13)+"\" y=\"12\" font-size=\"9\" fill=\"#4a4640\">"+s.label+"</text>";
      lx+=100;
    });
  }
  // Legend for trend line
  svg+="<rect x=\""+(W-P.r-110)+"\" y=\"4\" width=\"10\" height=\"8\" rx=\"2\" fill=\"#1d6b40\" opacity=\"0.75\"/>";
  svg+="<text x=\""+(W-P.r-97)+"\" y=\"12\" font-size=\"8.5\" fill=\"#4a4640\">LOESS trend</text>";
  svg+="</svg>";
  return"<div class=\"linechart-wrap\">"+svg+"</div>";
}

    });
  });
  h+='</tbody></table></div>';
  return h;
}

function roundNotes(r){
  const g=activeGoal();
  const op=r.score-r.par,ns=[];
  if(op<=10)ns.push({t:"pos",a:"Scoring",m:`+${op} - exceptional round.`});
  else if(op<=14)ns.push({t:"pos",a:"Scoring",m:`+${op} - near season low pace.`});
  else if(op>=20)ns.push({t:"neg",a:"Scoring",m:`+${op} above target. Focus on bogey avoidance.`});
  else ns.push({t:"neu",a:"Scoring",m:`+${op} - within typical range.`});
  if(r.playable>=80)ns.push({t:"pos",a:"Off the Tee",m:`${r.playable}% playable - excellent tee management.`});
  else if(r.playable<57)ns.push({t:"neg",a:"Off the Tee",m:`Only ${r.playable}% playable is costing strokes.`});
  if(r.gir>=g.gir+6)ns.push({t:"pos",a:"Ball Striking",m:`${r.gir}% GIR beats ${g.label} benchmark (${g.gir}%).`});
  else if(r.gir<25)ns.push({t:"neg",a:"Ball Striking",m:`${r.gir}% GIR very low. Distance control is priority.`});
  if(r.threePutt>=30)ns.push({t:"neg",a:"Putting",m:`${r.threePutt}% three-putt rate costing 2+ strokes.`});
  else if(r.threePutt===0)ns.push({t:"pos",a:"Putting",m:`0% three-putts - exceptional lag putting.`});
  else if(r.putts<=g.putts)ns.push({t:"pos",a:"Putting",m:`${r.putts} putts at or below ${g.label} benchmark (${g.putts}).`});
  if(r.greenShort>=50)ns.push({t:"neg",a:"Approach",m:`${r.greenShort}% short misses - take one more club.`});
  if(r.ob>0)ns.push({t:"neg",a:"Penalty",m:`OB on ${r.ob}% of holes cost strokes.`});
  if(r.upDownPct>=g.upDown)ns.push({t:"pos",a:"Short Game",m:`${r.upDownPct}% U&D meets ${g.label} benchmark.`});
  if(r.doubles<=1)ns.push({t:"pos",a:"Damage Control",m:`Only ${r.doubles} double - excellent damage control.`});
  return ns;
}

function seasonNotes(SA,rounds){
  const g=activeGoal();
  const validRounds=rounds.filter(r=>r.score>0);

  const low=Math.min(...validRounds.map(r=>r.score));
  const lr=validRounds.find(r=>r.score===low)||validRounds[0];
  return[
    {t:"pos",a:"Season Low",m:`${low} at ${lr.location} - current benchmark. Keep chasing it.`},
    {t:"neu",a:"Color Coding",m:`Stats colored vs ${g.label} benchmark (your current index). Visit Benchmark tab to compare any handicap level.`},
    {t:SA.greenShort>=28?"neg":"neu",a:"#1 Priority",m:`${fmt(SA.greenShort)}% of missed greens are short - one more club is the biggest scoring lever.`},
    {t:SA.threePutt>=g.threePutt?"neg":"pos",a:"Putting",m:`${fmt(SA.threePutt)}% three-putt rate vs ${g.threePutt}% ${g.label} benchmark (avg ${fmt(SA.putts)} putts/round).`},
    {t:SA.gir>=g.gir?"pos":"neg",a:"Ball Striking",m:`GIR avg ${fmt(SA.gir)}% vs ${g.gir}% ${g.label} benchmark. Gap: ${(SA.gir-g.gir).toFixed(1)}%.`},
    {t:SA.upDownPct>=g.upDown?"pos":"focus",a:"Short Game",m:`Up & down ${fmt(SA.upDownPct)}% vs ${g.upDown}% ${g.label} benchmark.`},
  ];
}

// ============================================================
// SCORE TREND CHART (Weight-App Style)
// ============================================================
function scoreTrendSVG(rs, opts){
  const n=rs.length;
  if(!n) return '<div style="font-size:11px;color:#8a8070;padding:8px">No rounds in this period</div>';
  if(n===1){
    return `<div style="display:flex;align-items:center;justify-content:center;height:80px;background:#faf7f2;border-radius:6px;font-size:28px;font-weight:700;color:#1a3a5c">${rs[0].score}<span style="font-size:11px;color:#8a8070;margin-left:8px;font-weight:400">${rs[0].location}</span></div>`;
  }
  const W=opts.W||900, H=opts.H||220;
  const P={t:36,r:64,b:40,l:50};
  const IW=W-P.l-P.r, IH=H-P.t-P.b;
  const scores=rs.map(r=>r.score);
  const minS=Math.min(...scores), maxS=Math.max(...scores);
  const spread=maxS-minS||4;
  // Tight padding — just 2 strokes above/below so variation fills the chart
  const yPad=Math.max(2, Math.ceil(spread*0.08));
  const yMin=minS-yPad, yMax=maxS+yPad;
  const yR=yMax-yMin||1;
  const px=i=>P.l+i*(IW/(n-1));
  const py=v=>P.t+IH-((v-yMin)/yR)*IH;
  const mainColor=opts.color||"#2ab090";

  // ── LOESS-style weighted moving average ──────────────────────
  // Bandwidth controls smoothing: too wide = flat line, too narrow = jagged.
  // Cap at ~4 rounds equivalent so large datasets still show real shape.
  function loess(vals, bw){
    const m=vals.length;
    return vals.map((_,i)=>{
      let wsum=0, wval=0;
      for(let j=0;j<m;j++){
        const d=Math.abs(i-j)/bw;
        const w=Math.exp(-0.5*d*d); // Gaussian kernel
        wsum+=w; wval+=w*vals[j];
      }
      return wval/wsum;
    });
  }
  // Fixed bandwidth of 3.5 rounds regardless of dataset size.
  // This keeps the curve responsive to real swings, not over-smoothed.
  const bw=3.5;
  const smoothedScores=loess(scores, bw);

  // Also compute a "range band" — upper/lower envelope of LOESS ± local stddev
  // This mimics the weight app's teal band that widens/narrows with variance
  function localStdDev(vals, smoothed, bw){
    return vals.map((_,i)=>{
      let wsum=0, wvar=0;
      for(let j=0;j<vals.length;j++){
        const d=Math.abs(i-j)/bw;
        const w=Math.exp(-0.5*d*d);
        wsum+=w; wvar+=w*(vals[j]-smoothed[i])**2;
      }
      return Math.sqrt(wvar/wsum);
    });
  }
  const stdDevs=localStdDev(scores, smoothedScores, bw);

  // Build SVG path from array of y-values using catmull-rom spline
  function splinePath(ys, reverse){
    const pts=ys.map((y,i)=>({x:px(i),y:py(y)}));
    if(reverse) pts.reverse();
    if(pts.length<2) return pts.map(p=>`L${p.x},${p.y}`).join("");
    let d=reverse?"":`M${pts[0].x},${pts[0].y}`;
    const start=reverse?0:1;
    for(let i=start;i<pts.length;i++){
      const p0=pts[Math.max(0,i-2)], p1=pts[Math.max(0,i-1)], p2=pts[i], p3=pts[Math.min(pts.length-1,i+1)];
      const t=0.4;
      const cp1x=p1.x+(p2.x-p0.x)*t, cp1y=p1.y+(p2.y-p0.y)*t;
      const cp2x=p2.x-(p3.x-p1.x)*t, cp2y=p2.y-(p3.y-p1.y)*t;
      d+=`C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
    }
    return d;
  }

  const upperBand=smoothedScores.map((s,i)=>s-stdDevs[i]*0.7); // upper = lower score (better)
  const lowerBand=smoothedScores.map((s,i)=>s+stdDevs[i]*0.7); // lower = higher score (worse)

  // Determine overall trend direction from smoothed first→last
  const trendDelta=smoothedScores[n-1]-smoothedScores[0];
  const improving=trendDelta<-0.5;
  const trendColor=improving?"#1d6b40":"#c0392b";

  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:${H}px;display:block;overflow:visible">`;

  // Grid lines — clean horizontal rules
  const gridVals=[];
  const step=spread<=8?2:spread<=20?5:10;
  const gridStart=Math.ceil(yMin/step)*step;
  for(let v=gridStart;v<=yMax;v+=step){
    gridVals.push(v);
  }
  gridVals.forEach(v=>{
    const gy=py(v);
    if(gy<P.t-2||gy>P.t+IH+2) return;
    svg+=`<line x1="${P.l}" y1="${gy}" x2="${W-P.r}" y2="${gy}" stroke="#e8e0d0" stroke-width="1"/>`;
    svg+=`<text x="${P.l-6}" y="${gy+3.5}" text-anchor="end" font-size="9" fill="#8a8070">${v}</text>`;
  });

  // ── Band fill between upper and lower envelope ────────────────
  // Like weight app: teal/green filled region, wider where scores vary more
  const upperPath=splinePath(upperBand, false);
  const lowerReturn=splinePath(lowerBand, true);
  const bandPath=upperPath+"L"+px(n-1)+","+py(lowerBand[n-1])+lowerReturn+"Z";
  svg+=`<path d="${bandPath}" fill="${mainColor}" opacity="0.18"/>`;

  // ── Smooth LOESS trend line through center ────────────────────
  const trendPath=splinePath(smoothedScores, false);
  svg+=`<path d="${trendPath}" fill="none" stroke="${mainColor}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;

  // ── Individual round dots with vertical whiskers ──────────────
  // Whisker drops from dot down to the smooth trend line (not baseline)
  // exactly like the weight app's spike lines
  const dataPts=rs.map((r,i)=>({x:px(i),y:py(r.score),ty:py(smoothedScores[i]),score:r.score}));
  dataPts.forEach((p,i)=>{
    const isLow=p.score===minS, isHigh=p.score===maxS, isLatest=i===n-1;
    const aboveTrend=p.y<p.ty; // score is better than trend (lower score = higher on chart since y flips)
    const whiskerColor=aboveTrend?"#1d6b40":"#c0392b";
    const dotColor=isHigh?"#c0392b":isLow?"#b8860b":isLatest?mainColor:"#6abfab";
    const dotR=isLow||isHigh||isLatest?5:3;
    // Whisker from dot to trend line
    svg+=`<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${p.ty}" stroke="${whiskerColor}" stroke-width="1.2" opacity="0.5"/>`;
    // Dot
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="${dotR}" fill="${dotColor}" stroke="#fff" stroke-width="1.5"/>`;
    // Score labels only on high, low, latest
    if(isLow||isHigh||isLatest){
      const labelY=p.y>P.t+14?p.y-9:p.y+15;
      svg+=`<text x="${p.x}" y="${labelY}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${dotColor}">${p.score}</text>`;
    }
  });

  // ── Trend direction annotation (top-right) ───────────────────
  const deltaLabel=trendDelta.toFixed(1);
  svg+=`<text x="${W-P.r-4}" y="${P.t-14}" text-anchor="end" font-size="10" font-weight="700" fill="${trendColor}">${improving?"↓ Improving":"↑ Watch"}</text>`;
  svg+=`<text x="${W-P.r-4}" y="${P.t-3}" text-anchor="end" font-size="9" fill="${trendColor}">${trendDelta>0?"+":""}${deltaLabel} stroke trend over ${n} rounds</text>`;

  // ── Right side: latest value callout ─────────────────────────
  const latestSmoothed=smoothedScores[n-1];
  const latestRaw=scores[n-1];
  svg+=`<text x="${W-P.r+8}" y="${py(latestSmoothed)+3}" font-size="9" fill="${mainColor}" font-weight="700">Trend</text>`;
  svg+=`<text x="${W-P.r+8}" y="${py(latestSmoothed)+14}" font-size="11" fill="${mainColor}" font-weight="800">${latestSmoothed.toFixed(1)}</text>`;
  svg+=`<text x="${W-P.r+8}" y="${py(latestRaw)+3}" font-size="9" fill="#6abfab" font-weight="700">Latest</text>`;
  svg+=`<text x="${W-P.r+8}" y="${py(latestRaw)+14}" font-size="11" fill="#6abfab" font-weight="800">${latestRaw}</text>`;

  // ── X axis date labels ────────────────────────────────────────
  const xskip=Math.max(1,Math.ceil(n/10));
  const MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  dataPts.forEach((p,i)=>{
    if(i%xskip!==0&&i!==n-1) return;
    let lbl;
    if(opts.dateMode==="year"){
      lbl=rs[i].date.slice(0,4); // YYYY
    } else if(opts.dateMode==="month"){
      const mo=parseInt(rs[i].date.slice(5,7),10)-1;
      lbl=MONTH_ABBR[mo]; // Jan, Feb...
    } else {
      lbl=rs[i].date.slice(5); // MM-DD default
    }
    svg+=`<text x="${p.x}" y="${H-6}" text-anchor="middle" font-size="8" fill="#8a8070">${lbl}</text>`;
  });

  svg+="</svg>";
  return svg;
}

function renderScoreTrend(allRounds){
  if(!allRounds.length) return '<div style="font-size:11px;color:#8a8070">No rounds found.</div>';

  // Stats summary
  const scores=allRounds.map(r=>r.score);
  const low=Math.min(...scores), high=Math.max(...scores);
  const avg=+(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
  const recent5=allRounds.slice(-5);
  const recent5avg=+(recent5.reduce((s,r)=>s+r.score,0)/recent5.length).toFixed(1);

  // Last round over 100
  const over100=allRounds.filter(r=>r.score>=100);
  const lastOver100=over100.length?over100[over100.length-1]:null;
  const roundsSinceover100=lastOver100?allRounds.length-1-allRounds.indexOf(lastOver100):allRounds.length;

  // Trend direction (all-time regression)
  function reg(rs){
    const m=rs.length; if(m<2) return 0;
    const xi=rs.map((_,i)=>i), yi=rs.map(r=>r.score);
    const sx=xi.reduce((a,b)=>a+b,0)/m, sy=yi.reduce((a,b)=>a+b,0)/m;
    const num=xi.reduce((s,x,i)=>s+(x-sx)*(yi[i]-sy),0);
    const den=xi.reduce((s,x)=>s+(x-sx)**2,0);
    return den?num/den:0;
  }
  const slope=reg(allRounds);
  const improving=slope<0;

  let h=`<div class="card">
    <div class="section-label blue">Score Trend — ${selectedYear==="all"?"All Time":selectedYear}</div>
    <div class="trend-stat-summary">
      <div class="trend-stat-box" style="border-top:3px solid #b8860b">
        <div class="trend-stat-val" style="color:#b8860b">${low}</div>
        <div class="trend-stat-lbl">Season Low</div>
        <div class="trend-stat-sub">${allRounds.find(r=>r.score===low)?.date.slice(5)||""}</div>
      </div>
      <div class="trend-stat-box" style="border-top:3px solid #8a8070">
        <div class="trend-stat-val" style="color:#4a4640">${high}</div>
        <div class="trend-stat-lbl">Season High</div>
        <div class="trend-stat-sub">${allRounds.find(r=>r.score===high)?.date.slice(5)||""}</div>
      </div>
      <div class="trend-stat-box" style="border-top:3px solid #1a3a5c">
        <div class="trend-stat-val" style="color:#1a3a5c">${avg}</div>
        <div class="trend-stat-lbl">Avg Score</div>
        <div class="trend-stat-sub">${allRounds.length} rounds</div>
      </div>
      <div class="trend-stat-box" style="border-top:3px solid ${improving?"#1d4a2a":"#c0392b"}">
        <div class="trend-stat-val" style="color:${improving?"#1d4a2a":"#c0392b"}">${recent5avg}</div>
        <div class="trend-stat-lbl">Recent 5 Avg</div>
        <div class="trend-stat-sub">${improving?"↓ Trending down":"↑ Trending up"}</div>
      </div>
      <div class="trend-stat-box" style="border-top:3px solid ${roundsSinceover100>=5?"#1d4a2a":"#b8860b"}">
        <div class="trend-stat-val" style="color:${roundsSinceover100>=5?"#1d4a2a":"#b8860b"}">${roundsSinceover100}</div>
        <div class="trend-stat-lbl">Rounds Since 100+</div>
        <div class="trend-stat-sub">${lastOver100?`Last: ${lastOver100.date.slice(5)}`:"No 100+ recorded"}</div>
      </div>
    </div>
  </div>`;

  // Period toggle
  h+=`<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
    <span style="font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase">View:</span>
    <button class="trend-period-btn${scoreTrendPeriod==="yearly"?" active":""}" onclick="setScoreTrendPeriod('yearly')">By Year</button>
    <button class="trend-period-btn${scoreTrendPeriod==="monthly"?" active":""}" onclick="setScoreTrendPeriod('monthly')">By Month</button>
    <button class="trend-period-btn${scoreTrendPeriod==="alltime"?" active":""}" onclick="setScoreTrendPeriod('alltime')">All Time</button>
  </div>`;

  if(scoreTrendPeriod==="alltime"){
    // Always use ALL rounds regardless of year/format filter
    const allTimeRounds=roundsForYear("all",selectedRoundType);
    h+=`<div class="card">
      <div class="section-label">All-Time Score Trend — ${allTimeRounds.length} Rounds</div>
      <div class="linechart-wrap">${scoreTrendSVG(allTimeRounds,{W:900,H:660,dateMode:"year"})}</div>
    </div>`;
  }

  if(scoreTrendPeriod==="yearly"){
    const yrsToShow=selectedYear==="all"?allYears():[selectedYear].filter(yr=>allYears().includes(yr));
    h+=`<div style="display:flex;flex-direction:column;gap:20px">`;
    yrsToShow.forEach(yr=>{
      const yRounds=roundsForYear(yr,selectedRoundType);
      if(!yRounds.length) return;
      const yrScores=yRounds.map(r=>r.score);
      const yrLow=Math.min(...yrScores),yrHigh=Math.max(...yrScores);
      const yrAvg=+(yrScores.reduce((a,b)=>a+b,0)/yrScores.length).toFixed(1);
      const yrSpread=yrHigh-yrLow;

      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div class="section-label" style="margin-bottom:2px">${yr} Season Score Trend</div>
            <div style="font-size:10px;color:#8a8070">${yRounds.length} rounds &nbsp;·&nbsp; ${yRounds[0].date.slice(5)} → ${yRounds[yRounds.length-1].date.slice(5)}</div>
          </div>
          <div style="display:flex;gap:16px;text-align:center">
            <div><div style="font-size:20px;font-weight:700;color:#b8860b">${yrLow}</div><div style="font-size:8px;color:#8a8070;letter-spacing:.06em">LOW</div></div>
            <div><div style="font-size:20px;font-weight:700;color:#c0392b">${yrHigh}</div><div style="font-size:8px;color:#8a8070;letter-spacing:.06em">HIGH</div></div>
            <div><div style="font-size:20px;font-weight:700;color:#1a3a5c">${yrAvg}</div><div style="font-size:8px;color:#8a8070;letter-spacing:.06em">AVG</div></div>
            <div><div style="font-size:20px;font-weight:700;color:#4a4640">${yrSpread}</div><div style="font-size:8px;color:#8a8070;letter-spacing:.06em">SPREAD</div></div>
          </div>
        </div>
        <div class="linechart-wrap">${scoreTrendSVG(yRounds,{W:900,H:600,dateMode:"month"})}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(scoreTrendPeriod==="monthly"){
    // Group by year+month
    const byMonth={};
    allRounds.forEach(r=>{
      const ym=r.date.slice(0,7);
      if(!byMonth[ym])byMonth[ym]=[];
      byMonth[ym].push(r);
    });
    const months=Object.keys(byMonth).sort();
    if(!months.length){h+='<div style="font-size:11px;color:#8a8070">No monthly data.</div>';return h;}

    const byYear={};
    months.forEach(ym=>{
      const yr=ym.slice(0,4);
      if(!byYear[yr])byYear[yr]=[];
      byYear[yr].push(ym);
    });

    Object.keys(byYear).sort().reverse().forEach(yr=>{
      const yMonths=byYear[yr];
      h+=`<div style="font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#1d4a2a;margin:14px 0 8px;padding-bottom:4px;border-bottom:2px solid #1d4a2a">${yr}</div>`;
      yMonths.forEach(ym=>{
        const mRounds=byMonth[ym];
        const mScores=mRounds.map(r=>r.score);
        const mLow=Math.min(...mScores),mHigh=Math.max(...mScores);
        const mAvg=+(mScores.reduce((a,b)=>a+b,0)/mScores.length).toFixed(1);
        const monthName=new Date(ym+"-15").toLocaleString("default",{month:"long"});
        h+=`<div class="card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div>
              <div style="font-size:13px;font-weight:800;color:#1d4a2a">${monthName} ${yr}</div>
              <div style="font-size:9px;color:#8a8070">${mRounds.length} round${mRounds.length!==1?"s":""}</div>
            </div>
            <div style="display:flex;gap:14px;text-align:center">
              <div><div style="font-size:18px;font-weight:700;color:#b8860b">${mLow}</div><div style="font-size:7px;color:#8a8070">LOW</div></div>
              <div><div style="font-size:18px;font-weight:700;color:#c0392b">${mHigh}</div><div style="font-size:7px;color:#8a8070">HIGH</div></div>
              <div><div style="font-size:18px;font-weight:700;color:#1a3a5c">${mAvg}</div><div style="font-size:7px;color:#8a8070">AVG</div></div>
            </div>
          </div>
          ${mRounds.length>=2
            ?`<div class="linechart-wrap">${scoreTrendSVG(mRounds,{W:900,H:320,dateMode:"mmdd"})}</div>`
            :`<div style="padding:16px;background:#faf7f2;border-radius:6px;display:flex;align-items:center;gap:12px">
                <div style="font-size:32px;font-weight:700;color:#1a3a5c">${mLow}</div>
                <div style="font-size:10px;color:#8a8070">${mRounds[0].location}<br>${mRounds[0].date.slice(5)}</div>
              </div>`
          }
        </div>`;
      });
    });
  }

  return h;
}

    ${kpi("Avg U&D",fmt(SA.upDownPct,1)+"%",null,goalColor(SA.upDownPct,GOAL.upDown),"border-"+colorClass(SA.upDownPct,GOAL.upDown))}

  if(seasonTab==="overview"){
    h+=`<div class="grid" style="margin-bottom:12px">
      <div class="card">
        <div class="section-label">Score Distribution - Avg/Round</div>
        ${[["Birdie+",SA.birdies,"#1a3a5c"],["Par",SA.pars,"#1d4a2a"],["Bogey",SA.bogeys,"#b8860b"],["Double+",SA.doubles,"#8b1a1a"]].filter(([l,n])=>n!=null).map(([l,n,c])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-size:11px;font-weight:700;color:${c}">${fmt(n,2)}/rnd - ${fmt(n/18*100,1)}%</span></div>${fillBar(n/18*100,c)}</div>`).join("")||'<div style="font-size:11px;color:#8a8070">Score distribution not available for this round type</div>'}

    const tn=rounds.length>20?` - most recent 20 of ${rounds.length}`:"";
    h+=`<div class="card" style="overflow-x:auto;margin-bottom:12px">
      <div class="section-label">Round-by-Round Summary<span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:#8a8070">${tn}</span></div>
      <table><thead><tr><th style="text-align:left">Date</th><th style="text-align:left">Course</th><th>Score</th><th>+/-</th><th>FIR%</th><th>Play%</th><th>GIR%</th><th>Putts</th><th>3Putt%</th><th>Pen</th><th>Par3</th><th>Par4</th><th>Par5</th></tr></thead><tbody>`;
    TR.forEach((r,i)=>{
      const op=r.score-r.par,isLow=r.score===seasonLow;
      h+=`<tr style="background:${isLow?"#fdf4dc":i%2===0?"transparent":"#faf7f2"}">
        <td style="text-align:left;color:#b8860b;font-weight:700;white-space:nowrap;font-size:10px">${r.date.slice(5)}${isLow?" *":""}</td>
        <td style="text-align:left;color:#4a4640;font-size:10px;white-space:nowrap">${r.location}</td>
        <td style="font-weight:700">${r.score}${r.adjScore!==r.score?` <span style="font-size:9px;color:#8a8070">(${r.adjScore})</span>`:""}</td>
        <td style="font-weight:700;color:${op<=10?C.pos:op<=14?C.warn:op<=18?"#b8860b":C.neg}">+${op}</td>
        <td style="color:${goalColor(r.fir,GOAL.fir)};font-weight:600">${r.fir}%</td>
        <td style="color:${goalColor(r.playable,GOAL.playable)};font-weight:600">${r.playable}%</td>
        <td style="color:${goalColor(r.gir,GOAL.gir)};font-weight:600">${r.gir}%</td>
        <td style="color:${goalColor(r.putts,GOAL.putts,true)}">${r.putts}</td>
        <td style="color:${goalColor(r.threePutt,GOAL.threePutt,true)}">${r.threePutt}%</td>
        <td style="color:${r.penalties>0?C.neg:C.dim}">${r.penalties||"-"}</td>
        <td style="font-size:10px;color:${goalColor(r.par3,GOAL.par3,true)}">${fmt(r.par3,2)}</td>
        <td style="font-size:10px;color:${goalColor(r.par4,GOAL.par4,true)}">${fmt(r.par4,2)}</td>
        <td style="font-size:10px;color:${goalColor(r.par5,GOAL.par5,true)}">${fmt(r.par5,2)}</td>

    });
    h+=`<tr class="avg-row"><td colspan="2" style="text-align:left;color:#1d4a2a;font-weight:800;font-size:10px;padding-left:8px">Season Avg</td>
      <td style="font-weight:700">${fmt(SA.score,1)}</td><td style="font-weight:700;color:#b8860b">${SA.score!=null?(()=>{const d=SA.score-(rounds[0]?.par||72);return(d>=0?"+":"")+fmt(d,1)})():"-"}</td>
      <td style="font-weight:700;color:${goalColor(SA.fir,GOAL.fir)}">${fmt(SA.fir,1)}%</td>
      <td style="font-weight:700;color:${goalColor(SA.playable,GOAL.playable)}">${fmt(SA.playable,1)}%</td>
      <td style="font-weight:700;color:${goalColor(SA.gir,GOAL.gir)}">${fmt(SA.gir,1)}%</td>

      <td style="color:${goalColor(SA.par4,GOAL.par4,true)}">${fmt(SA.par4,2)}</td>

    </tr></tbody></table></div>`;

    h+=`<div style="margin-top:12px">${notes(seasonNotes(SA,rounds))}</div>`;

    // ── Consistency / Standard Deviation Card ─────────────────────
    if(rounds.length>=4){
      function sdOf(arr){
        const n2=arr.length; if(!n2) return null;
        const m=arr.reduce((a,b)=>a+b,0)/n2;
        return +Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/n2).toFixed(1);
      }
      const validR=rounds.filter(r=>r.score>0);
      const sdScore=sdOf(validR.map(r=>r.score));
      const sdGir=sdOf(validR.filter(r=>r.gir!=null).map(r=>r.gir));
      const sdPutts=sdOf(validR.filter(r=>r.putts>0).map(r=>r.putts));
      const sdFir=sdOf(validR.filter(r=>r.fir!=null).map(r=>r.fir));
      const sdPar4=sdOf(validR.filter(r=>r.par4!=null).map(r=>r.par4));
      const sdUnd=sdOf(validR.filter(r=>r.upDownPct!=null).map(r=>r.upDownPct));

      // Interpret SD bands — tour/scratch/mid-am benchmarks
      // Score SD: <4 = very consistent, 4-6 = normal 10-14 HCP, >7 = volatile
      // GIR SD: <8 = consistent ball-striking, 8-14 = normal, >14 = volatile
      // Putts SD: <2.5 = consistent, 2.5-4 = normal, >4 = volatile
      function sdRating(val,threshLow,threshHigh){
        if(val==null) return null;
        if(val<=threshLow) return {label:"Consistent",color:"#1d6b40",bg:"#e8f4ec"};
        if(val<=threshHigh) return {label:"Normal",color:"#b8860b",bg:"#fdf4dc"};
        return {label:"Volatile",color:"#8b1a1a",bg:"#fdecea"};
      }
      const rScore=sdRating(sdScore,4,7);
      const rGir=sdRating(sdGir,8,14);
      const rPutts=sdRating(sdPutts,2.5,4);
      const rFir=sdRating(sdFir,10,18);

      // Ceiling score — best realistic score (avg - 1 SD), floor (avg + 1 SD)
      const avgScore=+(validR.reduce((s,r)=>s+r.score,0)/validR.length).toFixed(1);
      const ceiling=sdScore!=null?+(avgScore-sdScore).toFixed(1):null;
      const floor2=sdScore!=null?+(avgScore+sdScore).toFixed(1):null;

      const sdRows=[
        {label:"Score / Round",sd:sdScore,r:rScore,note:`1-SD range: ${ceiling} \u2013 ${floor2}. Measures round-to-round score variance.`},
        {label:"GIR % / Round",sd:sdGir,r:rGir,note:"High SD here = ball-striking unreliable under pressure. Target &lt;8."},
        {label:"Putts / Round",sd:sdPutts,r:rPutts,note:"Low SD = reliable green reading and lag control. Target &lt;2.5."},
        {label:"FIR % / Round",sd:sdFir,r:rFir,note:"Tee shot variability. High = inconsistent driver or decision-making."},
        ...(sdPar4!=null?[{label:"Par 4 Avg SD",sd:sdPar4,r:sdRating(sdPar4,0.4,0.7),note:"Par 4 execution consistency. Tour avg ~0.3. Target &lt;0.5."}]:[]),
        ...(sdUnd!=null?[{label:"Up & Down % SD",sd:sdUnd,r:sdRating(sdUnd,12,20),note:"Short game consistency round to round."}]:[]),
      ];

      h+='<div class="card" style="margin-top:12px">';
      h+='<div class="section-label gold">Consistency Report \u2014 Standard Deviation Analysis</div>';
      h+='<div style="font-size:11px;color:#4a4640;margin-bottom:12px;line-height:1.6">Standard deviation measures how much your stats vary round to round. A low SD means reliable, repeatable performance \u2014 the hallmark of a scratch-level player. A high SD means big swings between rounds, which is the main driver of high handicaps even when your best rounds look good.</div>';
      h+='<div style="overflow-x:auto"><table><thead><tr><th style="text-align:left">Stat</th><th>SD</th><th>Rating</th><th style="text-align:left;font-size:9px">Coach Note</th></tr></thead><tbody>';
      sdRows.forEach(function(row){
        if(row.sd==null||row.r==null)return;
        h+='<tr>';
        h+='<td style="text-align:left;font-weight:600;color:#4a4640">'+row.label+'</td>';
        h+='<td style="font-weight:700;font-size:15px">'+row.sd+'</td>';
        h+='<td><span style="font-weight:700;color:'+row.r.color+';background:'+row.r.bg+';padding:2px 8px;border-radius:4px;font-size:10px">'+row.r.label+'</span></td>';
        h+='<td style="text-align:left;font-size:10px;color:#8a8070">'+row.note+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';

      // Mini visualization: score bell curve approximation using a simple bar spread
      if(validR.length>=4&&sdScore!=null){
        const scores2=validR.map(r=>r.score).sort((a,b)=>a-b);
        const mn=scores2[0], mx=scores2[scores2.length-1];
        const bucketSize=sdScore>5?4:3;
        const buckets={};
        scores2.forEach(function(s){
          const k=Math.floor(s/bucketSize)*bucketSize;
          buckets[k]=(buckets[k]||0)+1;
        });
        const bKeys=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
        const bMax=Math.max.apply(null,Object.values(buckets));
        const W2=860,H2=100,Pl=40,Pr=20,Pt=12,Pb=28;
        const IW2=W2-Pl-Pr,IH2=H2-Pt-Pb;
        const bw=Math.max(8,Math.floor(IW2/bKeys.length)-3);
        const bx=function(i){return Pl+i*(IW2/bKeys.length)+((IW2/bKeys.length)-bw)/2;};
        let svg2='<svg viewBox="0 0 '+W2+' '+H2+'" style="width:100%;max-height:'+H2+'px;display:block">';
        // baseline
        svg2+='<line x1="'+Pl+'" y1="'+(Pt+IH2)+'" x2="'+(W2-Pr)+'" y2="'+(Pt+IH2)+'" stroke="#ddd5c4" stroke-width="1"/>';
        // avg line
        const avgX2=Pl+((avgScore-mn)/(mx-mn+0.001))*IW2;
        svg2+='<line x1="'+avgX2+'" y1="'+Pt+'" x2="'+avgX2+'" y2="'+(Pt+IH2)+'" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="4,3"/>';
        svg2+='<text x="'+avgX2+'" y="'+(Pt-2)+'" text-anchor="middle" font-size="8.5" fill="#b8860b" font-weight="700">Avg '+avgScore+'</text>';
        bKeys.forEach(function(k,i){
          const cnt=buckets[k];
          const bh=(cnt/bMax)*IH2;
          const by2=Pt+IH2-bh;
          const x2=bx(i);
          const fromAvg=k+bucketSize/2-avgScore;
          const col=Math.abs(fromAvg)<=sdScore?'#2ab090':Math.abs(fromAvg)<=sdScore*2?'#1a3a5c':'#c0392b';
          svg2+='<rect x="'+x2+'" y="'+by2+'" width="'+bw+'" height="'+bh+'" fill="'+col+'" rx="2" opacity="0.82"/>';
          svg2+='<text x="'+(x2+bw/2)+'" y="'+(Pt+IH2+13)+'" text-anchor="middle" font-size="8" fill="#8a8070">'+k+'</text>';
          if(cnt>1)svg2+='<text x="'+(x2+bw/2)+'" y="'+(by2-3)+'" text-anchor="middle" font-size="8" fill="#4a4640">'+cnt+'</text>';
        });
        // SD band labels
        if(ceiling&&floor2){
          const cx2=Pl+((ceiling-mn)/(mx-mn+0.001))*IW2;
          const fx2=Pl+((floor2-mn)/(mx-mn+0.001))*IW2;
          svg2+='<line x1="'+cx2+'" y1="'+Pt+'" x2="'+cx2+'" y2="'+(Pt+IH2)+'" stroke="#2ab090" stroke-width="1" stroke-dasharray="3,3"/>';
          svg2+='<line x1="'+fx2+'" y1="'+Pt+'" x2="'+fx2+'" y2="'+(Pt+IH2)+'" stroke="#2ab090" stroke-width="1" stroke-dasharray="3,3"/>';
          svg2+='<text x="'+cx2+'" y="'+(Pt+IH2/2)+'" text-anchor="middle" font-size="7.5" fill="#2ab090">-1SD</text>';
          svg2+='<text x="'+fx2+'" y="'+(Pt+IH2/2)+'" text-anchor="middle" font-size="7.5" fill="#2ab090">+1SD</text>';
        }
        svg2+='</svg>';
        h+='<div style="margin-top:14px"><div style="font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#1a3a5c;margin-bottom:6px">Score Distribution</div>';
        h+='<div style="font-size:9px;color:#8a8070;margin-bottom:6px">Teal bars = within 1 SD of avg. Blue = 1-2 SD. Red = outlier beyond 2 SD. Dashed gold line = avg. Teal dashed = &plusmn;1 SD band.</div>';
        h+=svg2+'</div>';
      }
      h+='</div>';
    }

    const allYrs=allYears();
    if(allYrs.length>=2){
      // Default to last two years if not yet set
      if(!yoyYearA||!allYrs.includes(yoyYearA))yoyYearA=allYrs[allYrs.length-2];
      if(!yoyYearB||!allYrs.includes(yoyYearB))yoyYearB=allYrs[allYrs.length-1];
      const rA=roundsForYear(yoyYearA,selectedRoundType),rB=roundsForYear(yoyYearB,selectedRoundType);
      const saA=calcSA(rA),saB=calcSA(rB);
      const yoyRows=[
        ["Score",saA.score,saB.score,true,""],
        ["FIR %",saA.fir,saB.fir,false,"%"],
        ["Playable %",saA.playable,saB.playable,false,"%"],
        ["GIR %",saA.gir,saB.gir,false,"%"],
        ["Putts/Rnd",saA.putts,saB.putts,true,""],
        ["3-Putt %",saA.threePutt,saB.threePutt,true,"%"],
        ["Up&Down %",saA.upDownPct,saB.upDownPct,false,"%"],
        ["Sand Save %",saA.sandSavePct,saB.sandSavePct,false,"%"],
        ["Penalties",saA.penalties,saB.penalties,true,""],
        ["Par 3 Avg",saA.par3,saB.par3,true,""],
        ["Par 4 Avg",saA.par4,saB.par4,true,""],
        ["Par 5 Avg",saA.par5,saB.par5,true,""],
        ["Green Short %",saA.greenShort,saB.greenShort,true,"%"],
        ["Miss Left %",saA.missTeeLeft,saB.missTeeLeft,true,"%"],
        ["Miss Right %",saA.missTeeRight,saB.missTeeRight,true,"%"],
      ];
      let yoyHtml="";
      yoyRows.forEach(function(row){
        const l=row[0],vA=row[1],vB=row[2],lower=row[3],u=row[4];
        if(vA==null||vB==null)return;
        const diff=lower?vA-vB:vB-vA; // positive = B is better
        const gc=diff>0.05?C.pos:diff<-0.05?C.neg:C.warn;
        const gb=diff>0.05?C.greenPale:diff<-0.05?C.redPale:C.goldPale;
        const arrow=diff>0.5?"Better":diff<-0.5?"Worse":"Same";
        yoyHtml+="<tr><td style=\"text-align:left;color:#4a4640\">"+l+"</td>";
        yoyHtml+="<td style=\"color:#8a8070\">"+fmt(vA,1)+u+"</td>";
        yoyHtml+="<td style=\"font-weight:700\">"+fmt(vB,1)+u+"</td>";
        yoyHtml+="<td><span style=\"font-weight:700;color:"+gc+";background:"+gb+";padding:1px 6px;border-radius:3px\">"+(diff>0?"+":"")+fmt(diff,1)+u+"</span></td>";
        yoyHtml+="<td style=\"font-size:10px;color:"+gc+";font-weight:700\">"+arrow+"</td></tr>";
      });
      h+="<div class=\"card\" style=\"margin-top:12px\">";
      h+="<div class=\"section-label gold\">Year-over-Year Comparison</div>";
      // Year picker controls
      h+="<div style=\"display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px 12px;background:#faf7f2;border-radius:6px;border:1px solid #ddd5c4\">";
      h+="<div><div style=\"font-size:9px;color:#8a8070;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px\">Year A (base)</div>";
      h+="<select onchange=\"setYoyYearA(this.value)\" style=\"font-weight:700\">";
      allYrs.forEach(function(yr){h+="<option value=\""+yr+"\""+(yr===yoyYearA?" selected":"")+">"+yr+"</option>";});
      h+="</select></div>";
      h+="<div style=\"font-size:18px;color:#8a8070;font-weight:300;padding-top:16px\">&rarr;</div>";
      h+="<div><div style=\"font-size:9px;color:#8a8070;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px\">Year B (compare)</div>";
      h+="<select onchange=\"setYoyYearB(this.value)\" style=\"font-weight:700\">";
      allYrs.forEach(function(yr){h+="<option value=\""+yr+"\""+(yr===yoyYearB?" selected":"")+">"+yr+"</option>";});
      h+="</select></div>";
      h+="<div style=\"font-size:11px;color:#4a4640;padding-top:16px\">"+rA.length+" rounds vs "+rB.length+" rounds &mdash; green = "+yoyYearB+" improved over "+yoyYearA+"</div>";
      h+="</div>";
      if(rA.length&&rB.length){
        h+="<div style=\"overflow-x:auto\"><table><thead><tr><th style=\"text-align:left\">Stat</th><th>"+yoyYearA+" ("+rA.length+"r)</th><th>"+yoyYearB+" ("+rB.length+"r)</th><th>Change</th><th>Direction</th></tr></thead><tbody>";
        h+=yoyHtml;
        h+="</tbody></table></div>";
      } else {
        h+="<div style=\"font-size:11px;color:#8a8070;padding:12px\">No rounds found for one or both selected years in this format.</div>";
      }
      h+="</div>";
    }
  }

  if(seasonTab==="trend"){
    h+=renderScoreTrend(rounds);
  }

  if(seasonTab==="tee"){
    h+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Tee Stats</div>
        ${statRow("FIR %",SA.fir,goalColor(SA.fir,GOAL.fir))}
        ${statRow("Playable Tee %",SA.playable,goalColor(SA.playable,GOAL.playable))}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ddd5c4;display:flex;justify-content:space-around">
          <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#8b4500">${fmt(SA.missTeeLeft,1)}%</div><div style="font-size:9px;color:#8a8070">Miss Left</div></div>
          <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1a3a5c">${fmt(SA.missTeeRight,1)}%</div><div style="font-size:9px;color:#8a8070">Miss Right</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">FIR & Playable % - All Rounds Trend</div>
      ${lineChart(rounds,[{key:"fir",label:"FIR %",color:C.pos,goalVal:GOAL.fir},{key:"playable",label:"Playable %",color:C.blue,goalVal:GOAL.playable}],{})}
    </div>
    <div class="card">
      <div class="section-label">Miss Direction % - All Rounds Trend</div>
      ${lineChart(rounds,[{key:"missTeeLeft",label:"Miss Left %",color:"#c87020",goalVal:null},{key:"missTeeRight",label:"Miss Right %",color:C.blue,goalVal:null}],{})}
    </div>`;
  }

  if(seasonTab==="app"){
    h+=`<div class="grid">
      <div class="card full">
        <div class="section-label">Season Approach GIR% by Distance</div>
        ${approachChart(SA.approach)}
      </div>
      <div class="card">
        <div class="section-label">Season Green Miss Pattern</div>
        ${[["v Short",SA.greenShort,C.neg],["^ Long",SA.greenLong,"#6a2abf"],["< Left",SA.greenLeft,"#8b4500"],["Right >",SA.greenRight,C.blue]].map(([l,v,c])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-size:12px;font-weight:700;color:${c}">${fmt(v,1)}%</span></div>${fillBar(v,c)}</div>`).join("")}
        <div style="margin-top:10px;padding:8px 10px;background:#fdeaea;border-radius:6px;border:1px solid ${C.neg}44;font-size:10px;color:${C.neg}">Short (${fmt(SA.greenShort,1)}%) is the dominant miss. Take one more club.</div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">GIR % Trend - All Rounds</div>
      ${lineChart(rounds,[{key:"gir",label:"GIR %",color:C.pos,goalVal:GOAL.gir}],{})}
    </div>
    <div class="card">
      <div class="section-label">Green Miss Short % Trend - All Rounds</div>
      ${lineChart(rounds,[{key:"greenShort",label:"Short Miss %",color:C.neg,goalVal:null}],{})}
    </div>`;
  }

  if(seasonTab==="putt"){
    h+=`<div class="grid">
      <div class="card">
        <div class="section-label">Season Putting Stats</div>
        ${[["Avg Putts/Round",fmt(SA.putts,1),goalColor(SA.putts,GOAL.putts,true)],["1-Putt %",fmt(SA.onePutt,1)+"%",C.pos],["2-Putt %",fmt(SA.twoPutt,1)+"%",C.warn],["3-Putt+ %",fmt(SA.threePutt,1)+"%",goalColor(SA.threePutt,GOAL.threePutt,true)],["Up & Down %",fmt(SA.upDownPct,1)+"%",goalColor(SA.upDownPct,GOAL.upDown)],["Putts/GIR",SA.avgPPG!=null?SA.avgPPG.toFixed(2):"-",SA.avgPPG!=null?goalColor(SA.avgPPG,1.80,true):C.dim]].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 8px;background:#faf7f2;border-radius:5px"><span style="font-size:11px;color:#4a4640">${l}</span><span style="font-weight:700;color:${c};font-size:14px">${v}</span></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="section-label">Total Putts per Round - Trend</div>
      ${lineChart(rounds,[{key:"putts",label:"Putts",color:C.neg,goalVal:GOAL.putts}],{})}
    </div>
    <div class="card">
      <div class="section-label">1-Putt / 2-Putt / 3-Putt % - Trend</div>
      ${lineChart(rounds,[{key:"onePutt",label:"1-Putt %",color:C.pos,goalVal:null},{key:"twoPutt",label:"2-Putt %",color:C.warn,goalVal:null},{key:"threePutt",label:"3-Putt %",color:C.neg,goalVal:GOAL.threePutt}],{})}
    </div>
    <div class="card">
      <div class="section-label">Up & Down % - Trend</div>
      ${lineChart(rounds,[{key:"upDownPct",label:"U&D %",color:C.blue,goalVal:GOAL.upDown}],{})}
    </div>`;
  }

  document.getElementById("main").innerHTML=h;
}

// ROUND VIEW
// ============================================================
function renderRound(SA,seasonLow){
  const r=ROUNDS.find(x=>x.id===selectedRoundId)||ROUNDS[ROUNDS.length-1];
  const sg=calcSG(r);
  const op=r.score-r.par;
  const isLow=r.score===seasonLow;
  const tabs=[["scoring","Scoring & Overview"],["tee","Tee & Fairway"],["app","Approach"],["putt","Putting"]];

  const allRoundYears=allYears();
  const filteredForYear=roundsForYear(roundYear,selectedRoundType);
  const recent=filteredForYear.slice(-5).reverse();
  let h="<div class=\"year-filter\" style=\"margin-bottom:6px\">";
  h+="<span style=\"font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase\">Year:</span>";
  allRoundYears.forEach(function(yr){
    h+="<button class=\"year-btn"+(roundYear===yr?" active":"")+"\" onclick=\"setRoundYear('"+yr+"')\">"+yr+"</button>";
  });
  if(allRoundYears.length>1){
    h+="<button class=\"year-btn"+(roundYear==="all"?" active":"")+"\" onclick=\"setRoundYear('all')\">All</button>";
  }
  h+="</div>";
  h+="<div class=\"year-filter\" style=\"margin-bottom:12px\">";
  h+="<span style=\"font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase\">Format:</span>";
  [["18hole","18 Hole"],["9hole","9 Hole"],["exec","Executive"],["all","All"]].forEach(function([v,l]){
    h+=`<button class="year-btn${selectedRoundType===v?" active":""}" onclick="setRoundType('${v}')">${l}</button>`;
  });
  h+="</div>";
  h+=`<div class="round-selector">
    <div><div class="round-select-label">Round (${filteredForYear.length} in ${roundYear==="all"?"all years":roundYear}${selectedRoundType!=="18hole"?" · "+selectedRoundType:""})</div>
    <select onchange="selectRound(this.value)">${[...filteredForYear].reverse().map(x=>`<option value="${x.id}"${x.id===r.id?" selected":""}>${x.date.slice(5)} - ${x.location} - ${x.score}</option>`).join("")}</select></div>
    <div class="divider"></div>
    <div class="recent-btns"><span class="round-select-label">Recent:</span>
      ${recent.map(x=>`<button class="recent-btn${x.id===r.id?" active":""}" onclick="selectRound('${x.id}')">${x.date.slice(5)} <span style="opacity:.7;font-size:9px">${x.location.split(" ")[0]}</span></button>`).join("")}
    </div>
    <div style="margin-left:auto;font-size:9px;color:#8a8070">${ROUNDS.length} total rounds - Low: ${seasonLow}</div>
  </div>`;
  h+=`<div style="margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #1d4a2a">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="font-size:22px;font-weight:700;color:#1d4a2a">${r.date}</div>
      ${isLow?'<span class="season-low-badge">* SEASON LOW</span>':""}
    </div>
    <div style="font-size:15px;color:#4a4640;margin-top:2px">${r.location} - ${r.tees||""} tees - ${r.yards} yds - Rating ${r.rating} / Slope ${r.slope} - Par ${r.par}${r.diff?` - Diff ${r.diff}`:""} - HCP ${r.hcp}</div>
  </div>
  <div class="kpi-row">
    ${kpi("Score",r.score,`+${op} over par${r.adjScore!==r.score?` (adj ${r.adjScore})`:""}`,op<=10?C.pos:op<=14?C.warn:op<=18?"#b8860b":C.neg,"border-"+(op<=10?"pos":op<=14?"warn":"neg"))}
    ${kpi("FIR",r.fir+"%",null,goalColor(r.fir,GOAL.fir),"border-"+colorClass(r.fir,GOAL.fir))}
    ${kpi("Playable",r.playable+"%",null,goalColor(r.playable,GOAL.playable),"border-"+colorClass(r.playable,GOAL.playable))}
    ${kpi("GIR",r.gir+"%",null,goalColor(r.gir,GOAL.gir),"border-"+colorClass(r.gir,GOAL.gir))}
    ${kpi("Putts",r.putts,null,goalColor(r.putts,GOAL.putts,true),"border-"+colorClass(r.putts,GOAL.putts,true))}
    ${kpi("3-Putt%",r.threePutt+"%",null,goalColor(r.threePutt,GOAL.threePutt,true),"border-"+colorClass(r.threePutt,GOAL.threePutt,true))}
    ${kpi("Penalties",r.penalties,null,r.penalties>0?C.neg:C.pos,r.penalties>0?"border-neg":"border-pos")}
    ${kpi("U&D",r.upDowns,r.upDownPct+"%",goalColor(r.upDownPct,GOAL.upDown),"border-"+colorClass(r.upDownPct,GOAL.upDown))}
    ${kpi("Sand Saves",r.sandSaves||"0/0",r.sandSavePct?r.sandSavePct+"%":null,C.dim,"border-ink")}
  </div>
  <div class="tab-row">${tabs.map(([k,l])=>`<button class="tab-btn${roundTab===k?" active":""}" onclick="setRoundTab('${k}')">${l}</button>`).join("")}</div>`;

  const _holesPlayed=r.par===36?9:18;
  if(roundTab==="scoring"){
    const approachDistances=[">200","175-200","150-175","125-150","100-125","75-100","50-75","<50"];
    const hasApproachData=r.approach&&approachDistances.some(d=>r.approach[d]!=null);
    const hasProximity=r.girProximityAvg!=null||r.scrambleProximityAvg!=null||r.shortPuttsMade!=null;
    // Proximity KPI row

function getCourseList(){
  const map={};
  const rounds18=ROUNDS.filter(r=>(!r.roundType||r.roundType==="18hole")&&r.score>0);
  rounds18.forEach(r=>{
    if(!map[r.location])map[r.location]={
      name:r.location,rounds:[],
      avgScore:0,bestScore:Infinity,worstScore:0,
      avgGir:0,avgFir:0,avgPutts:0,avgPlayable:0,
      rating:r.rating,slope:r.slope,par:r.par
    };
    map[r.location].rounds.push(r);
  });
  Object.values(map).forEach(c=>{
    const rs=c.rounds,n=rs.length;
    c.avgScore=+(rs.reduce((s,r)=>s+r.score,0)/n).toFixed(1);
    c.bestScore=Math.min(...rs.map(r=>r.score));
    c.worstScore=Math.max(...rs.map(r=>r.score));
    c.avgGir=+(rs.reduce((s,r)=>s+r.gir,0)/n).toFixed(1);
    c.avgFir=+(rs.reduce((s,r)=>s+r.fir,0)/n).toFixed(1);
    c.avgPutts=+(rs.reduce((s,r)=>s+r.putts,0)/n).toFixed(1);
    c.avgPlayable=+(rs.filter(r=>r.playable>0).reduce((s,r)=>s+r.playable,0)/Math.max(1,rs.filter(r=>r.playable>0).length)).toFixed(1);
    c.trend=rs.length>=3?getTrend(rs.map(r=>r.score)):"flat";
    c.avgOP=+(c.avgScore-c.par).toFixed(1);
  });
  return Object.values(map).filter(c=>c.rounds.length>=3).sort((a,b)=>b.rounds.length-a.rounds.length);
}

function getTrend(scores){
  if(scores.length<3)return"flat";
  const n=scores.length,last3=scores.slice(-3),first3=scores.slice(0,3);
  const lastAvg=last3.reduce((a,b)=>a+b,0)/3,firstAvg=first3.reduce((a,b)=>a+b,0)/3;
  if(lastAvg<firstAvg-1.5)return"improving";
  if(lastAvg>firstAvg+1.5)return"declining";
  return"flat";
}

function trendBadge(t){
  const map={improving:{c:C.pos,l:"v Improving",bg:C.greenPale},declining:{c:C.neg,l:"^ Declining",bg:C.redPale},flat:{c:C.warn,l:"-> Stable",bg:C.goldPale}};
  const m=map[t]||map.flat;
  return`<span style="font-size:9px;font-weight:800;color:${m.c};background:${m.bg};padding:2px 7px;border-radius:3px;border:1px solid ${m.c}33">${m.l}</span>`;
}

function renderClubs(){

      <th>Median Yds</th><th>Avg Yds</th><th>Max (P90)</th><th>Distance Bar</th>
      <th>GIR%</th><th>Target</th><th>Gap</th>

    clubs.forEach(clubName=>{
      const c=CLUB_DATA.find(x=>x.club===clubName);

  h+=notes(items);

  document.getElementById("main").innerHTML=h;
}

  if(sa.threePutt<=11)str.push("3-putt rate ("+fmt(sa.threePutt,1)+"%) at 9 HCP level.");
  if(sa.upDownPct>=36)str.push("Up-and-down rate ("+fmt(sa.upDownPct,1)+"%) is strong.");
  if(sa.fir<60)foc.push("FIR% ("+fmt(sa.fir,1)+"%) below "+GOAL.fir+"% target. Check alignment on tight tee shots.");
  if(sa.gir<36)foc.push("GIR% ("+fmt(sa.gir,1)+"%) needs to reach "+GOAL.gir+"%. Distance control 100-150 yards is key.");
  if(sa.putts>32.5)foc.push("Avg "+fmt(sa.putts,1)+" putts/round vs 32.5 goal. Lag putting practice from 25-40 feet.");
  if(sa.threePutt>11)foc.push("3-putt rate ("+fmt(sa.threePutt,1)+"%) above 11% goal.");
  if(sa.greenShort>=28)foc.push(fmt(sa.greenShort,1)+"% of green misses are short -- take one more club.");
  foc.push("Sand saves and up-and-down are the hidden scoring levers at the 9-14 HCP level.");
  var sNotes=str.map(function(s){return{t:"pos",a:"Strength",m:s};});
  var fNotes=foc.map(function(s){return{t:"neg",a:"Focus",m:s};});
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';
  h+=notes(sNotes.length?sNotes:[{t:"neu",a:"Note",m:"Add more 18-hole rounds to identify strengths."}]);
  h+=notes(fNotes);
  h+='</div>';
  document.getElementById("main").innerHTML=h;
}
// ============================================================
// BENCHMARK VIEW
// ============================================================
function renderBenchmark(){
  var hcpKeys=[0,5,9,12,15,18];
  const rounds=roundsForYear(selectedYear,selectedRoundType);
  const SA=calcSA(rounds);
  const bm=HCP_BENCHMARKS[benchmarkHcp];

  // Your season stats — keys must match allStatDefs and benchTable keys
  const you={
    fir:SA.fir,playable:SA.playable,gir:SA.gir,putts:SA.putts,threePutt:SA.threePutt,
    dblWorse:SA.dblWorsePct,upDown:SA.upDownPct,sandSave:SA.sandSavePct,penalties:SA.penalties,
    par3:SA.par3,par4:SA.par4,par5:SA.par5,
    gir200p:SA.approach?SA.approach[">200"]:null,
    gir175_200:SA.approach?SA.approach["175-200"]:null,
    gir150_175:SA.approach?SA.approach["150-175"]:null,
    gir100_125:SA.approach?SA.approach["100-125"]:null,
    // keep old aliases too for the KPI rows
    gir175:SA.approach?SA.approach["175-200"]:null,
    gir150:SA.approach?SA.approach["150-175"]:null,
    gir100:SA.approach?SA.approach["100-125"]:null,
    girU100:(function(){var v75=SA.approach?SA.approach["75-100"]:null,v50=SA.approach?SA.approach["<50"]:null;return v75!=null&&v50!=null?(v75+v50)/2:v75!=null?v75:v50;})(),
  };

  let h='<div style="margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #1d4a2a">';
  h+='<div style="font-size:9px;color:#1d4a2a;letter-spacing:.18em;text-transform:uppercase;font-weight:800">Benchmark Comparison</div>';
  h+='<div style="font-size:26px;font-weight:700;color:#1a1a14;letter-spacing:-.02em;margin-top:2px">Your Stats vs Amateur Benchmarks</div>';
  h+='<div style="font-size:11px;color:#8a8070;margin-top:3px">Arccos &amp; Lou Stagner data &mdash; median performers at each level. Not tour-inflated &mdash; real amateur tracking.</div>';
  h+='</div>';

  // Dropdown + year selector row
  h+='<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;padding:12px 14px;background:#fff;border:1px solid #ddd5c4;border-radius:8px">';
  h+='<div><div style="font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Compare vs</div>';
  h+='<select onchange="setBenchmarkHcp(this.value)" style="font-size:13px;font-weight:700;padding:6px 12px">';
  hcpKeys.forEach(function(k){
    h+='<option value="'+k+'"'+(k===benchmarkHcp?' selected':'')+'>'+HCP_BENCHMARKS[k].label+'</option>';
  });
  h+='</select></div>';
  h+='<div><div style="font-size:9px;color:#8a8070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Your Data</div>';
  h+='<div class="year-filter" style="margin:0">';
  const yrs2=allYears();
  yrs2.forEach(function(yr){h+='<button class="year-btn'+(selectedYear===yr?' active':'')+'" onclick="setYear(\''+yr+'\')">'+yr+'</button>';});
  if(yrs2.length>1)h+='<button class="year-btn'+(selectedYear==="all"?' active':'')+'" onclick="setYear(\'all\')">All Time</button>';
  h+='</div></div>';
  // Current HCP context note
  const lastHcp=_INIT_18.length?_INIT_18[_INIT_18.length-1].hcp:null;
  if(lastHcp)h+='<div style="margin-left:auto;text-align:right"><div style="font-size:9px;color:#8a8070;letter-spacing:.08em;text-transform:uppercase">Your Current Index</div><div style="font-size:24px;font-weight:700;color:#1d4a2a">'+lastHcp+'</div></div>';
  h+='</div>';

  // KPI gap summary row
  const kpiRows=[
    {l:"GIR %",     v:you.gir,     bv:bm.gir,     lb:false,u:"%"},
    {l:"FIR %",     v:you.fir,     bv:bm.fir,     lb:false,u:"%"},
    {l:"Putts/Rnd", v:you.putts,   bv:bm.putts,   lb:true, u:""},
    {l:"3-Putt %",  v:you.threePutt,bv:bm.threePutt,lb:true,u:"%"},
    {l:"U&D %",     v:you.upDown,  bv:bm.upDown,  lb:false,u:"%"},
    {l:"Penalties", v:you.penalties,bv:bm.penalties,lb:true,u:""},
  ];
  h+='<div class="kpi-row" style="margin-bottom:16px">';
  kpiRows.forEach(function(row){
    if(row.v==null)return;
    const diff=row.lb?row.bv-row.v:row.v-row.bv; // positive = you beat benchmark
    const col=diff>=0?C.pos:Math.abs(diff)<=Math.abs(row.bv)*0.12?C.warn:C.neg;
    const arrow=diff>=0?'+':'-';
    h+='<div class="kpi" style="border-left:3px solid '+col+'">';
    h+='<div class="kpi-label">'+row.l+'</div>';
    h+='<div class="kpi-value" style="color:'+col+'">'+fmt(row.v,1)+row.u+'</div>';
    h+='<div class="kpi-sub">Benchmark: '+fmt(row.bv,1)+row.u+'</div>';
    h+='<div style="font-size:11px;font-weight:700;color:'+col+';margin-top:2px">'+(diff>=0?'+':'')+fmt(diff,1)+row.u+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // Main comparison table
  const sections=[
    {l:"SCORING",rows:[
      {l:"Double Bogey+ %",v:you.dblWorse,bv:bm.dblWorse,lb:true,u:"%",note:"Eliminating doubles is the fastest path to lower scores"},
      {l:"Par 3 Avg",      v:you.par3,    bv:bm.par3,    lb:true,u:"", note:"Par 3s: score vs par matters most here"},
      {l:"Par 4 Avg",      v:you.par4,    bv:bm.par4,    lb:true,u:"", note:"~60% of your round — biggest scoring lever"},
      {l:"Par 5 Avg",      v:you.par5,    bv:bm.par5,    lb:true,u:"", note:"Par 5s should be your birdie opportunities"},
    ]},
    {l:"DRIVING",rows:[
      {l:"FIR %",      v:you.fir,     bv:bm.fir,     lb:false,u:"%",note:"Note: FIR doesn't improve much below 9 HCP — not a primary differentiator"},
      {l:"Playable %", v:you.playable,bv:bm.playable,lb:false,u:"%",note:"Playable tee shots (fairway + acceptable miss)"},
    ]},
    {l:"APPROACH / GIR",rows:[
      {l:"GIR % Overall",    v:you.gir,    bv:bm.gir,    lb:false,u:"%",note:"Strongest predictor of handicap — prioritize this"},
      {l:"GIR 200+ yds",     v:you.gir200p,bv:bm.gir200p,lb:false,u:"%",note:"Long approach accuracy"},
      {l:"GIR 175-200 yds",  v:you.gir175, bv:bm.gir175_200,lb:false,u:"%",note:""},
      {l:"GIR 150-175 yds",  v:you.gir150, bv:bm.gir150_175,lb:false,u:"%",note:""},
      {l:"GIR 100-125 yds",  v:you.gir100, bv:bm.gir100_125,lb:false,u:"%",note:"Scoring zone — should be high"},
      {l:"GIR Inside 100",   v:you.girU100,bv:bm.girU100,   lb:false,u:"%",note:"Must convert these"},
    ]},
    {l:"SHORT GAME",rows:[
      {l:"Up & Down %", v:you.upDown,  bv:bm.upDown,  lb:false,u:"%",note:"Biggest gap between 12 HCP and scratch"},
      {l:"Sand Save %", v:you.sandSave,bv:bm.sandSave,lb:false,u:"%",note:""},
    ]},
    {l:"PUTTING",rows:[
      {l:"Putts / Round",v:you.putts,    bv:bm.putts,    lb:true,u:"", note:"Context: more GIR = longer first putts = more total putts"},
      {l:"3-Putt %",     v:you.threePutt,bv:bm.threePutt,lb:true,u:"%",note:"Most coachable putting stat — lag putting practice"},
    ]},
    {l:"PENALTIES",rows:[
      {l:"Penalties / Round",v:you.penalties,bv:bm.penalties,lb:true,u:"",note:"Each penalty is ~1.4 strokes lost on average"},
    ]},
  ];

  h+='<div class="card" style="overflow-x:auto">';
  h+='<div class="section-label gold">Full Stat Comparison &mdash; You vs '+bm.label+'</div>';
  h+='<div style="font-size:10px;color:#8a8070;margin-bottom:12px">Green = you beat the benchmark. Gold = within 12%. Red = gap to close. Sources: Arccos Golf / Lou Stagner amateur tracking data.</div>';
  h+='<table><thead><tr><th style="text-align:left">Stat</th><th>You</th><th>'+bm.label+'</th><th>Gap</th><th style="text-align:left;font-size:9px">Note</th></tr></thead><tbody>';
  sections.forEach(function(sec){
    h+='<tr><td colspan="5" class="bench-section">'+sec.l+'</td></tr>';
    sec.rows.forEach(function(row){
      if(row.v==null)return;
      const diff=row.lb?row.bv-row.v:row.v-row.bv;
      const better=diff>=0,close=!better&&Math.abs(diff)<=Math.abs(row.bv)*0.12;
      const gc=better?C.pos:close?C.warn:C.neg,gb=better?C.greenPale:close?C.goldPale:C.redPale;
      h+='<tr>';
      h+='<td style="text-align:left;padding-left:14px;color:#4a4640">'+row.l+'</td>';
      h+='<td style="font-weight:700;font-size:13px">'+fmt(row.v,1)+row.u+'</td>';
      h+='<td style="color:#8a8070">'+fmt(row.bv,1)+row.u+'</td>';
      h+='<td><span class="gap-badge" style="color:'+gc+';background:'+gb+';border:1px solid '+gc+'33">'+(diff>=0?'+':'')+fmt(diff,1)+row.u+'</span></td>';
      h+='<td style="text-align:left;font-size:9px;color:#8a8070">'+row.note+'</td>';
      h+='</tr>';
    });
  });
  h+='</tbody></table></div>';

  // All-stats multi-handicap table
  const allStatDefs=[
    {k:"gir",      l:"GIR %",           lb:false, u:"%"},
    {k:"fir",      l:"FIR %",           lb:false, u:"%"},
    {k:"playable", l:"Playable %",      lb:false, u:"%"},
    {k:"putts",    l:"Putts/Rnd",       lb:true,  u:""},
    {k:"threePutt",l:"3-Putt %",        lb:true,  u:"%"},
    {k:"upDown",   l:"Up &amp; Down %", lb:false, u:"%"},
    {k:"sandSave", l:"Sand Save %",     lb:false, u:"%"},
    {k:"dblWorse", l:"Double+ %",       lb:true,  u:"%"},
    {k:"penalties",l:"Penalties/Rnd",   lb:true,  u:""},
    {k:"par3",     l:"Par 3 Avg",       lb:true,  u:""},
    {k:"par4",     l:"Par 4 Avg",       lb:true,  u:""},
    {k:"par5",     l:"Par 5 Avg",       lb:true,  u:""},
    {k:"gir200p",  l:"GIR 200+ yds",    lb:false, u:"%"},
    {k:"gir175_200",l:"GIR 175-200",    lb:false, u:"%"},
    {k:"gir150_175",l:"GIR 150-175",    lb:false, u:"%"},
    {k:"gir100_125",l:"GIR 100-125",    lb:false, u:"%"},
    {k:"girU100",  l:"GIR &lt;100",     lb:false, u:"%"},
  ];
  h+='<div class="card" style="margin-top:12px">';
  h+='<div class="section-label blue">Across All Handicap Levels &mdash; Full Stat Matrix</div>';
  h+='<div style="font-size:10px;color:#8a8070;margin-bottom:12px">Your season average compared to every benchmark level. Teal column = you. Color shows which bracket your stat is closest to.</div>';
  h+='<div style="overflow-x:auto"><table><thead><tr><th style="text-align:left;min-width:110px">Stat</th>';
  hcpKeys.forEach(function(k){
    const isSel=k===benchmarkHcp;
    h+='<th style="'+(isSel?'background:#fdf4dc;font-weight:800':'')+'">'+HCP_BENCHMARKS[k].label.replace(' HCP','<br><span style="font-size:8px">HCP</span>')+'</th>';
  });
  h+='<th style="background:#e0f0ea;font-weight:800;color:#1d4a2a">You</th></tr></thead><tbody>';
  allStatDefs.forEach(function(stat){
    const youVal=you[stat.k];
    h+='<tr><td style="text-align:left;font-weight:600;color:#4a4640;font-size:10px">'+stat.l+'</td>';
    hcpKeys.forEach(function(k){
      const bv=HCP_BENCHMARKS[k][stat.k];
      if(bv==null){h+='<td style="color:#c8bfa8">-</td>';return;}
      const isSel=k===benchmarkHcp;
      h+='<td style="font-size:11px;'+(isSel?'background:#fdf4dc;font-weight:700':'color:#4a4640')+'">'+fmt(bv,1)+stat.u+'</td>';
    });
    if(youVal==null){h+='<td style="background:#e0f0ea;color:#8a8070">-</td>';h+='</tr>';return;}
    // Find which HCP bracket you're closest to
    const diffs=hcpKeys.map(function(k){
      const bv=HCP_BENCHMARKS[k][stat.k];
      if(bv==null)return Infinity;
      return Math.abs(bv-youVal);
    });
    const closestIdx=diffs.indexOf(Math.min.apply(null,diffs));
    const closestHcp=hcpKeys[closestIdx];
    const youColor=closestHcp<=5?C.pos:closestHcp<=9?'#2a7a50':closestHcp<=12?C.warn:'#8b4500';
    h+='<td style="background:#e0f0ea;font-weight:800;color:'+youColor+';font-size:12px">'+fmt(youVal,1)+stat.u+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  document.getElementById("main").innerHTML=h;
}
